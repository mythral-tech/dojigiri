rules:
- category: security
  id: hardcoded-secret
  message: Possible hardcoded secret or API key — credential exposure if repository is shared or leaked
  pattern: (?i)(?<!\w)(?!(?:fake|mock|dummy|stub|cookie[_-]?name|header[_-]?name|field[_-]?name|content[_-]?key|config[_-]?key)[_-]?)(?:api[_-]?key|secret[_-]?key|secret|password|passwd|token|auth[_-]?token|jwt[_-]?secret|signing[_-]?key|encryption[_-]?key|private[_-]?key|client[_-]?secret|\w+[_-](?:secret|token|password|passwd|pass|key))\s*[:=]\s*['"](?!(?:demo|example|placeholder|test|sample|changeme|change[_-]me|your[_-]?|xxx|TODO|INSERT|REPLACE)[_\-0-9'"])(?![a-z][a-z_]{6,}['"])[A-Za-z0-9+/=_\-!@#$%^&*]{8,}['"]
  severity: critical
  suggestion: Use environment variables or a secrets manager; rotate the exposed credential immediately
  cwe: CWE-798
- category: security
  id: hardcoded-secret-dict
  message: Possible hardcoded secret in dict/config literal
  pattern: (?i)['"](?:api[_-]?key|secret[_-]?key|password|passwd|token|auth[_-]?token|database[_-]?password|db[_-]?password|aws[_-]?secret[_-]?\w*|client[_-]?secret|private[_-]?key|encryption[_-]?key|signing[_-]?key|\w+[_-]secret[_-]?\w*key|\w+[_-]secret)['"]\s*:\s*['"](?!(?:demo|example|placeholder|test|sample|changeme|change[_-]me|your[_-]?|xxx|TODO|INSERT|REPLACE)[_\-0-9'"])[A-Za-z0-9+/=_\-!@#$%^&*.]{8,}['"]
  severity: critical
  suggestion: Use environment variables or a secrets manager
- category: security
  id: aws-credentials
  message: Possible hardcoded AWS credentials
  pattern: (?i)(?:aws[_-]?access|aws[_-]?secret)\s*[:=]\s*['"][A-Za-z0-9+/=]{16,}['"]
  severity: critical
  suggestion: Use IAM roles or environment variables
- category: style
  id: todo-marker
  message: TODO/FIXME marker found — track in issue tracker
  pattern: (?i)(?:^|\s)(?:#|//|/\*|\*|--|;).*\b(?:TODO|FIXME|HACK|XXX)\b
  severity: info
  suggestion: Create a ticket and reference it in the comment
- category: style
  id: long-line
  message: Line exceeds 200 characters
  pattern: ^.{201,}$
  severity: info
  suggestion: Break into multiple lines for readability
- category: security
  id: insecure-http
  message: Insecure HTTP URL (not localhost) — data transmitted in cleartext
  pattern: (?!.*(?:xmlns\s*=|data:))['"]http://(?!localhost|127\.0\.0\.1|0\.0\.0\.0|www\.w3\.org/|schemas\.|purl\.org/|xml\.org/|relaxng\.org/|docbook\.org/|openid\.net/|ogp\.me/)
  severity: warning
  suggestion: Use HTTPS to encrypt data in transit
  cwe: CWE-319
- category: security
  id: sql-injection-execute
  message: SQL injection — string interpolation in query allows attacker to modify SQL logic
  pattern: (?i)(?:execute(?:many)?|cursor\.execute(?:many)?|query|\.execute)\s*\(\s*(?:f['"]|['"].*?%s|['"].*?\+\s*\w+|['"].*?\{)
  severity: warning
  suggestion: Use parameterized queries with placeholders (?, %s, $1) and bind parameters
  cwe: CWE-89
- category: security
  id: sql-injection-format
  message: SQL injection — .format() on SQL string allows query manipulation
  pattern: (?i)['"](?:SELECT|INSERT|UPDATE|DELETE|DROP|CREATE|ALTER)\b.*?['"]\.format\s*\(
  severity: warning
  suggestion: Use parameterized queries instead of string formatting
  cwe: CWE-89
- category: security
  id: sql-injection-fstring
  message: Possible SQL injection — f-string inside text()
  pattern: (?i)(?:(?:sa|sqlalchemy|db|session|engine|conn(?:ection)?)\.)?text\s*\(\s*f['"](?:SELECT|INSERT|UPDATE|DELETE|DROP|CREATE|ALTER|GRANT|TRUNCATE|WITH)\b
  severity: warning
  suggestion: Use text() with :param bindparams instead
- category: security
  id: sql-injection-concat
  message: Possible SQL injection — string concatenation on SQL query
  pattern: (?i)['"](?:SELECT|INSERT|UPDATE|DELETE|DROP)\b.*?['"]\s*\+
  severity: warning
  suggestion: Use parameterized queries instead of string concatenation
- category: security
  id: sql-injection-percent
  message: Possible SQL injection — % formatting on SQL query
  pattern: (?i)['"](?:SELECT|INSERT|UPDATE|DELETE|DROP)\b[^'"]*%s[^'"]*['"]\s*%
  severity: warning
  suggestion: Use parameterized queries instead of % formatting
- category: security
  id: sql-injection-raw
  message: Django .raw() with string interpolation — SQL injection
  pattern: \.raw\s*\(\s*(?:f['"]|['"].*?\.format\s*\(|['"].*?%s)
  severity: warning
  suggestion: 'Use .raw() with parameterized query: Model.objects.raw(''SELECT ... WHERE id = %s'', [user_id])'
- category: security
  id: google-api-key
  message: Possible Google API key in source
  pattern: AIza[0-9A-Za-z_-]{35}
  severity: critical
  suggestion: Use environment variables or a secrets manager; rotate the key
- category: security
  id: github-token
  message: Possible GitHub token in source
  pattern: gh[pousr]_[0-9A-Za-z]{36,}
  severity: critical
  suggestion: Revoke and rotate the token; use environment variables
- category: security
  id: slack-token
  message: Possible Slack token in source
  pattern: xox[baprs]-[0-9A-Za-z-]{10,}
  severity: critical
  suggestion: Revoke and rotate the token; use environment variables
- category: security
  id: generic-bearer-token
  message: Hardcoded Bearer token in source
  pattern: (?i)['"]Bearer\s+[A-Za-z0-9._\-]{20,}['"]
  severity: critical
  suggestion: Use environment variables or a secrets manager
- category: security
  id: stripe-key
  message: Possible Stripe API key in source
  pattern: (?:sk|pk)_(?:live|test)_[0-9A-Za-z]{24,}
  severity: critical
  suggestion: Use environment variables; rotate the key
- category: bug
  id: debugger-statement
  message: debugger statement left in code
  pattern: ^\s*debugger\s*;?\s*$
  severity: warning
  suggestion: Remove debugger statement before shipping
- category: bug
  id: commented-code-block
  message: Large block of commented-out code
  pattern: (?:^|\n)\s*(?://|#)\s*(?:if|for|while|def|class|function|return|import|const|let|var)\b
  severity: info
  suggestion: Remove dead code; use version control for history
- category: bug
  id: empty-catch
  message: Empty exception/catch block — errors silently swallowed
  pattern: (?:catch\s*\([^)]*\)\s*\{\s*\}|except[^:]*:\s*(?:pass|\.\.\.)\s*$)
  severity: warning
  suggestion: Log the error or re-raise; never silently swallow exceptions
- category: security
  id: env-file-committed
  message: .env file reference — ensure .env is in .gitignore
  pattern: (?:dotenv|load_dotenv|require\s*\(\s*['"]dotenv['"])
  severity: info
  suggestion: Ensure .env files are in .gitignore and never committed
- category: style
  id: magic-number
  message: Magic number — consider naming as a constant
  pattern: (?<![\w.])(?:(?:[2-9]\d{2,}|1\d{3,}))(?![\w.])(?!\s*[;:=])
  severity: info
  suggestion: Extract to a named constant for clarity
- category: security
  id: hardcoded-jwt-secret
  message: Hardcoded JWT secret — signing key must not be in source
  pattern: (?i)jwt[_.]?secret\s*[:=]\s*['"][^'"]{8,}['"]
  severity: critical
  suggestion: Use environment variables for JWT secrets
- category: security
  id: base64-secret
  message: Base64-encoded string that may be a secret
  pattern: (?i)(?:secret|password|token|key)\s*[:=]\s*['"][A-Za-z0-9+/]{40,}={0,2}['"]
  severity: warning
  suggestion: Use environment variables or a secrets manager
- category: bug
  id: fixme-critical
  message: FIXME marker — indicates known bug
  pattern: (?i)\bFIXME\b.*(?:bug|crash|fail|break|corrupt|leak|overflow|underflow)
  severity: warning
  suggestion: Fix the known bug before shipping
- category: security
  id: npm-token
  message: Possible npm token in source
  pattern: npm_[0-9A-Za-z]{36}
  severity: critical
  suggestion: Revoke and rotate the token; use .npmrc with env vars
- category: security
  id: sendgrid-key
  message: Possible SendGrid API key in source
  pattern: SG\.[0-9A-Za-z._-]{22}\.[0-9A-Za-z._-]{43}
  severity: critical
  suggestion: Use environment variables; rotate the key
- category: security
  id: twilio-key
  message: Possible Twilio API key in source
  pattern: SK[0-9a-fA-F]{32}
  severity: warning
  suggestion: Use environment variables; rotate the key
- category: bug
  id: trailing-whitespace
  message: Trailing whitespace
  pattern: '[ \t]+$'
  severity: info
  suggestion: Remove trailing whitespace
- category: bug
  id: mixed-indentation
  message: Mixed tabs and spaces in indentation
  pattern: ^(?:\t+ +| +\t+)\S
  severity: info
  suggestion: Use consistent indentation (tabs or spaces, not both)
