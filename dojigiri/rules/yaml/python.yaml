rules:
- category: bug
  id: bare-except
  message: Bare except catches all exceptions including SystemExit and KeyboardInterrupt
  pattern: '^\s*except\s*:'
  severity: warning
  suggestion: Use 'except Exception:' to avoid catching KeyboardInterrupt/SystemExit
- category: bug
  id: mutable-default
  message: Mutable default argument — shared across all calls
  pattern: def\s+\w+\s*\([^)]*=\s*(?:\[\]|\{\}|set\(\))
  severity: warning
  suggestion: Use None as default and create inside function body
- category: style
  id: none-comparison
  message: Use 'is None' or 'is not None' instead of == / !=
  pattern: (?:==|!=)\s*None
  severity: warning
  suggestion: Replace with 'is None' or 'is not None'
- category: security
  id: eval-usage
  message: eval() can execute arbitrary code
  pattern: \beval\s*\(
  severity: critical
  suggestion: Use ast.literal_eval() for safe evaluation, or avoid entirely
- category: security
  id: exec-usage
  message: exec() can execute arbitrary code
  pattern: \bexec\s*\(
  severity: critical
  suggestion: Avoid exec() — restructure code to not need it
- category: bug
  id: open-without-with
  message: File opened without 'with' statement — may not be closed on error
  pattern: ^(?!\s*with\s)\s*\w+\s*=\s*open\s*\(
  severity: warning
  suggestion: Use 'with open(...) as f:' for automatic cleanup
- category: security
  id: os-system
  message: os.system() is vulnerable to shell injection
  pattern: \bos\.system\s*\(
  severity: warning
  suggestion: Use subprocess.run() with a list of arguments
- category: security
  id: shell-true
  message: subprocess with shell=True is vulnerable to injection
  pattern: subprocess\.\w+\([^)]*shell\s*=\s*True
  severity: warning
  suggestion: Pass command as a list without shell=True
- category: security
  id: subprocess-audit
  message: subprocess call — verify input is not constructed from untrusted data
  pattern: subprocess\.(?:run|call|check_call|check_output|Popen)\s*\((?!\s*\[)
  severity: info
  suggestion: Ensure command arguments are hardcoded or validated, never from raw user input
- category: style
  id: star-import
  message: Star import pollutes namespace and hides dependencies
  pattern: ^from\s+\S+\s+import\s+\*
  severity: warning
  suggestion: Import specific names instead
- category: bug
  id: assert-statement
  message: Assert statements are stripped with -O flag
  pattern: (?:^\s*|[;:]\s*)assert\s+
  severity: info
  suggestion: Use explicit if/raise for production checks
- category: style
  id: fstring-no-expr
  message: f-string without any expressions — unnecessary f prefix
  pattern: (?<!\w)f(['"])(?!\1\1)(?:(?:\\.|(?!\{)(?!\1)[^\\]))*\1
  severity: info
  suggestion: Remove the f prefix
- category: security
  id: pickle-unsafe
  message: Unsafe deserialization via pickle/dill/cloudpickle/shelve/jsonpickle — can execute arbitrary code
  pattern: \b(?:pickle|cPickle|_pickle)\.(?:loads?\s*\(|Unpickler\s*\()|\b(?:dill|cloudpickle|shelve)\.loads?\s*\(|\bjsonpickle\.(?:decode|loads?)\s*\(
  severity: critical
  suggestion: Use json, msgpack, or a safe serialization format instead
- category: security
  id: yaml-unsafe
  message: yaml.load()/load_all()/unsafe_load() can execute arbitrary code without SafeLoader
  pattern: \byaml\.(?:load|load_all|unsafe_load|unsafe_load_all)\s*\(
  severity: critical
  suggestion: Use yaml.safe_load() or yaml.safe_load_all() instead
- category: security
  id: weak-hash
  message: MD5/SHA1 are cryptographically weak hash algorithms
  pattern: \bhashlib\.(?:md5|sha1)\b|\bhashlib\.new\s*\(\s*['"](?:md5|sha1)['"]
  severity: warning
  suggestion: Use hashlib.sha256() or stronger for security-sensitive hashing
- category: security
  id: weak-random
  message: random module is not cryptographically secure
  pattern: \brandom\.(?:choice|randint|random|uniform|randrange|shuffle|sample)\s*\(
  severity: info
  suggestion: Use secrets module for security-sensitive random values
- category: security
  id: unsafe-deserialization
  message: marshal/shelve can execute arbitrary code during deserialization
  pattern: \b(?:marshal\.loads?\s*\(|shelve\.open\s*\()
  severity: critical
  suggestion: Use json or msgpack for untrusted data; shelve is pickle-backed
- category: security
  id: insecure-tempfile
  message: mktemp/tempnam/tmpnam are vulnerable to race conditions (TOCTOU)
  pattern: \b(?:tempfile\.mktemp\s*\(|os\.tempnam\s*\(|os\.tmpnam\s*\()
  severity: warning
  suggestion: Use tempfile.mkstemp() or tempfile.NamedTemporaryFile() instead
- category: security
  id: os-exec
  message: os.exec*() replaces the current process — verify arguments are trusted
  pattern: \bos\.exec(?:l|le|lp|lpe|v|ve|vp|vpe)\s*\(
  severity: warning
  suggestion: Use subprocess.run() for better control and input validation
- category: security
  id: os-spawn
  message: os.spawn*() spawns a new process — verify arguments are trusted
  pattern: \bos\.spawn(?:l|le|lp|lpe|v|ve|vp|vpe)\s*\(
  severity: warning
  suggestion: Use subprocess.run() for better control and input validation
- category: security
  id: os-popen
  message: os.popen() starts a shell process — vulnerable to injection
  pattern: \bos\.popen\s*\(
  severity: warning
  suggestion: Use subprocess.run() with a list of arguments instead
- category: security
  id: subprocess-shell
  message: subprocess.getoutput()/getstatusoutput() always uses shell — vulnerable to injection
  pattern: \bsubprocess\.(?:getoutput|getstatusoutput)\s*\(
  severity: warning
  suggestion: Use subprocess.run() with a list of arguments instead
- category: security
  id: os-startfile
  message: os.startfile() opens file with default handler — could launch executables
  pattern: \bos\.startfile\s*\(
  severity: warning
  suggestion: Validate file type and path before opening
- category: security
  id: insecure-file-permissions
  message: os.chmod() with overly permissive mode — group or world permissions are non-zero
  pattern: \bos\.chmod\s*\([^)]*,\s*0o?[0-7](?:[1-7][0-7]|[0-7][1-7])\b
  severity: warning
  suggestion: Use restrictive permissions (e.g., 0o600 for owner-only read/write)
- category: security
  id: jinja2-autoescape-off
  message: Jinja2 Environment with autoescape disabled — XSS risk
  pattern: \bEnvironment\s*\(\s*\)|\bEnvironment\s*\([^)]*autoescape\s*=\s*False
  severity: warning
  suggestion: Use autoescape=True or select_autoescape() for HTML templates
- category: security
  id: pycrypto-deprecated
  message: pyCrypto is unmaintained and has known vulnerabilities
  pattern: from\s+Crypto(?:\.Cipher)?\s+import\s+
  severity: info
  suggestion: Switch to pycryptodome (same API, maintained fork)
- category: security
  id: ssl-wrap-socket
  message: ssl.wrap_socket() is deprecated and does not verify certificates by default
  pattern: \bssl\.wrap_socket\s*\(
  severity: warning
  suggestion: Use ssl.SSLContext.wrap_socket() with proper cert verification
- category: security
  id: requests-no-verify
  message: requests call with verify=False disables SSL certificate verification
  pattern: (?:requests|httpx)\.(?:get|post|put|delete|patch|head|options|request)\s*\([^)]*verify\s*=\s*False
  severity: warning
  suggestion: Remove verify=False to enable certificate verification (default behavior)
- category: security
  id: ssl-verify-disabled
  message: SSL certificate verification disabled — vulnerable to MITM attacks
  pattern: \.verify\s*=\s*False|\bssl\._create_unverified_context\s*\(|\bssl\.CERT_NONE\b
  severity: warning
  suggestion: Enable certificate verification (use ssl.create_default_context() or remove verify=False)
- category: security
  id: hardcoded-tmp
  message: Hardcoded /tmp path — predictable location vulnerable to symlink attacks
  pattern: '[''"]\/(?:tmp|var\/tmp)\/'
  severity: info
  suggestion: Use tempfile.mkdtemp() or tempfile.NamedTemporaryFile() for secure temp files
- category: security
  id: hardcoded-password-default
  message: Default secret/password in function signature — visible in source and help()
  pattern: def\s+\w+\s*\([^)]*(?:password|secret|secret_key|api_key|token)\s*(?::\s*\w+\s*)?=\s*['"][^'"]+['"]
  severity: warning
  suggestion: Use None as default and require explicit argument or env var
- category: security
  id: debug-enabled
  message: DEBUG=True may expose sensitive information in production
  pattern: (?:^\s*DEBUG\s*=\s*True\b|\.run\s*\([^)]*debug\s*=\s*True)
  severity: warning
  suggestion: Set DEBUG=False in production and use environment variables
- category: security
  id: compile-usage
  message: compile() can compile arbitrary code — verify input is trusted
  pattern: \bcompile\s*\([^)]*,\s*['\"]<(?:string|input)>['\"]
  severity: warning
  suggestion: Use ast.literal_eval() for safe evaluation of data literals
- category: security
  id: regex-injection
  message: Regex pattern from variable — potential ReDoS if user-controlled
  pattern: \bre\.(?:compile|search|match|findall|sub|split)\s*\(\s*(?![bruf]*['\"])\w+
  severity: info
  suggestion: Use re.escape() on user input or set a timeout with regex module
- category: security
  id: http-connection-cleartext
  message: HTTPConnection uses unencrypted HTTP
  pattern: \bhttp\.client\.HTTPConnection\s*\(
  severity: warning
  suggestion: Use http.client.HTTPSConnection for encrypted connections
- category: security
  id: archive-slip
  message: Archive extractall() without path validation — zip/tar slip attack
  pattern: \b(?:zipfile\.ZipFile|ZipFile)\s*\([^)]*\).*\.extractall\s*\(|\.extractall\s*\(
  severity: warning
  suggestion: Validate member paths before extraction or use extraction filters
- category: security
  id: tarfile-open
  message: tarfile.open() — ensure extractall() uses data_filter or validates member paths
  pattern: \btarfile\.open\b
  severity: info
  suggestion: Use tf.extractall(filter='data') (Python 3.12+) or validate each member
- category: security
  id: unencrypted-ftp
  message: FTP transmits credentials and data in cleartext
  pattern: \bftplib\.FTP\s*\(
  severity: warning
  suggestion: Use ftplib.FTP_TLS or SFTP (paramiko) instead
- category: security
  id: unencrypted-telnet
  message: Telnet transmits everything in cleartext — inherently insecure
  pattern: \btelnetlib\.Telnet\s*\(
  severity: warning
  suggestion: Use SSH (paramiko) instead of telnet
- category: security
  id: smtp-cleartext
  message: SMTP connection may transmit credentials in cleartext
  pattern: \bsmtplib\.SMTP\s*\(
  severity: info
  suggestion: Use smtplib.SMTP_SSL or call starttls() immediately after connecting
- category: security
  id: webbrowser-open
  message: webbrowser.open() can open arbitrary URL schemes (file://, javascript:)
  pattern: \bwebbrowser\.open\s*\(
  severity: info
  suggestion: Validate the URL scheme against an allowlist before opening
- category: security
  id: ctypes-load-library
  message: Loading shared library via ctypes — arbitrary code execution if path is user-controlled
  pattern: \bctypes\.(?:cdll|windll|oledll)\.LoadLibrary\s*\(
  severity: warning
  suggestion: Validate library path against allowlist, never accept user input
- category: security
  id: rmtree-audit
  message: shutil.rmtree() recursively deletes — verify path is not user-controlled
  pattern: \bshutil\.rmtree\s*\(
  severity: info
  suggestion: Validate path against a safe base directory before deletion
- category: security
  id: dynamic-import
  message: Dynamic module import — arbitrary code execution if module name is user-controlled
  pattern: \bimportlib\.import_module\s*\(\s*(?![bruf]*['\"])\w+
  severity: info
  suggestion: Validate module name against an allowlist
- category: security
  id: env-path-injection
  message: Modifying LD_PRELOAD/PATH/PYTHONPATH — can enable code injection
  pattern: os\.environ\s*\[\s*['"](?:LD_PRELOAD|LD_LIBRARY_PATH|PATH|PYTHONPATH)['"]\s*\]\s*=
  severity: warning
  suggestion: Avoid modifying these environment variables at runtime
- category: security
  id: sys-path-modify
  message: sys.path modification — could enable module hijacking if path is untrusted
  pattern: \bsys\.path\.(?:insert|append)\s*\(
  severity: info
  suggestion: Avoid dynamic sys.path changes with untrusted paths
- category: security
  id: django-mark-safe
  message: mark_safe() bypasses Django's auto-escaping — XSS risk if content is user-controlled
  pattern: \bmark_safe\s*\(
  severity: warning
  suggestion: Use format_html() or escape user content before marking safe
- category: security
  id: django-extra-sql
  message: QuerySet.extra() uses raw SQL — injection risk if values are user-controlled
  pattern: \.extra\s*\(
  severity: warning
  suggestion: Use Django ORM methods (filter, annotate) instead of extra()
- category: security
  id: paramiko-auto-add-policy
  message: AutoAddPolicy() accepts unknown SSH host keys — vulnerable to MITM attacks
  pattern: \bparamiko\.AutoAddPolicy\s*\(
  severity: warning
  suggestion: Use RejectPolicy or manually verify host keys
- category: security
  id: paramiko-exec-command
  message: SSH exec_command — verify command is not constructed from user input
  pattern: \.exec_command\s*\(
  severity: info
  suggestion: Validate and sanitize command arguments, use allowlist of commands
- category: security
  id: weak-rsa-key
  message: RSA key size < 2048 bits is considered breakable
  pattern: key_size\s*=\s*(?:512|768|1024)\b
  severity: warning
  suggestion: Use key_size=2048 or higher (NIST recommends >= 2048)
- category: security
  id: insecure-crypto
  message: TripleDES/3DES is deprecated — slow and approaching theoretical breaks
  pattern: \bTripleDES\b|\b3DES\b|\bDES3\b
  severity: warning
  suggestion: Use AES-256 or ChaCha20 instead
- category: security
  id: hardcoded-secret-key
  message: SECRET_KEY hardcoded in source — session hijacking and forgery risk
  pattern: ^\s*SECRET_KEY\s*=\s*['"][A-Za-z0-9+/=_\-!@#$%^&*]{8,}['"]
  severity: critical
  suggestion: Load SECRET_KEY from environment variable or secrets manager
- category: security
  id: csrf-middleware-disabled
  message: CsrfViewMiddleware not found in MIDDLEWARE — CSRF protection disabled
  pattern: (?:MIDDLEWARE(?:_CLASSES)?)\s*=\s*\[(?:[^\]]*?)(?!.*CsrfViewMiddleware).*?\]
  severity: warning
  suggestion: Add 'django.middleware.csrf.CsrfViewMiddleware' to MIDDLEWARE
- category: security
  id: csrf-exempt
  message: '@csrf_exempt disables CSRF protection on this view'
  pattern: '@csrf_exempt\b'
  severity: warning
  suggestion: Remove @csrf_exempt or implement alternative CSRF validation
- category: security
  id: django-allowed-hosts-wildcard
  message: ALLOWED_HOSTS = ['*'] accepts any Host header — HTTP Host header attacks
  pattern: ALLOWED_HOSTS\s*=\s*\[\s*['\"]\*['\"]
  severity: warning
  suggestion: Set ALLOWED_HOSTS to specific domain names
- category: security
  id: django-raw-sql
  message: Raw SQL query — injection risk if parameters are not properly escaped
  pattern: \.raw\s*\(\s*(?!['\"]SELECT\s)(?!['\"]INSERT\s)|RawSQL\s*\(
  severity: warning
  suggestion: Use Django ORM queries or pass parameters via the params argument
- category: security
  id: unsafe-redirect
  message: Redirect target may be user-controlled — open redirect vulnerability
  pattern: \bredirect\s*\(\s*(?:request\.|f['\"]|[a-zA-Z_]\w*(?:\[|\.))
  severity: warning
  suggestion: Validate redirect URL against allowlist or use url_for()/reverse()
- category: security
  id: flask-send-file-traversal
  message: send_file() with user-controlled path — directory traversal risk
  pattern: \bsend_file\s*\(\s*(?:request\.|f['\"]|os\.path\.join\s*\([^)]*request\.)
  severity: warning
  suggestion: Use send_from_directory() with a fixed base directory instead
- category: security
  id: weak-tls-version
  message: Weak TLS protocol version — SSLv2/v3/TLS1.0/1.1 are broken or deprecated
  pattern: \bssl\.PROTOCOL_(?:SSLv2|SSLv3|SSLv23|TLSv1(?:_1)?)\b|minimum_version\s*=\s*ssl\.TLSVersion\.(?:SSLv3|TLSv1(?:_1)?)\b|\bSSL\.(?:SSLv2_METHOD|SSLv3_METHOD|SSLv23_METHOD|TLSv1_METHOD|TLSv1_1_METHOD)\b
  severity: critical
  suggestion: Use TLS 1.2+ minimum (ssl.PROTOCOL_TLS_CLIENT, ssl.TLSVersion.TLSv1_2, or SSL.TLSv1_2_METHOD)
- category: security
  id: weak-cipher-suite
  message: Weak cipher suite configured — RC4/DES/NULL/EXPORT/anon ciphers are broken
  pattern: set_ciphers\s*\(\s*['"](?:[^'"]*(?:RC4|DES|NULL|EXPORT|anon|eNULL|aNULL)[^'"]*)['"]\s*\)
  severity: critical
  suggestion: 'Use strong cipher suites: set_ciphers(''ECDHE+AESGCM:ECDHE+CHACHA20:DHE+AESGCM'')'
- category: security
  id: empty-password-check
  message: Comparing password against empty string — weak authentication logic
  pattern: (?:password|passwd|pass|secret)\s*(?:==|!=)\s*['"]["']
  severity: warning
  suggestion: Use proper password validation with minimum length/complexity requirements
- category: security
  id: empty-password-connection
  message: Connection with empty password string — authentication bypass risk
  pattern: \.connect\s*\([^)]*password\s*=\s*['"]["']
  severity: warning
  suggestion: Require non-empty password from secure credential store
- category: security
  id: cors-wildcard
  message: CORS wildcard allows any origin — credentials and data may leak cross-origin
  pattern: (?:Access-Control-Allow-Origin|CORS_ORIGIN_ALLOW_ALL|CORS_ALLOW_ALL_ORIGINS)\s*[:=]\s*(?:['\"]?\*['\"]?|True)|\bCORS\s*\(\s*\w+\s*(?:,\s*origins\s*=\s*['\"]?\*['\"]?)?(?:\s*\))
  severity: warning
  suggestion: Specify allowed origins explicitly via an allowlist
- category: security
  id: security-header-disabled
  message: Security header explicitly disabled — browser protections weakened
  pattern: ^\s*(?:SECURE_BROWSER_XSS_FILTER|X_FRAME_OPTIONS|SECURE_CONTENT_TYPE_NOSNIFF)\s*=\s*False
  severity: warning
  suggestion: Set to True or remove the override to use Django's secure defaults
- category: security
  id: ssl-redirect-disabled
  message: SECURE_SSL_REDIRECT=False — HTTP traffic not redirected to HTTPS
  pattern: ^\s*SECURE_SSL_REDIRECT\s*=\s*False
  severity: info
  suggestion: Set SECURE_SSL_REDIRECT=True in production
- category: security
  id: zipfile-extract-audit
  message: Archive extract() — verify member path does not escape target directory
  pattern: \.extract\s*\(\s*(?!.*\bfilter\b)
  severity: info
  suggestion: Check that extracted path starts with intended directory (no ../ traversal)
- category: security
  id: session-cookie-insecure
  message: SESSION_COOKIE_SECURE=False — session cookie sent over HTTP
  pattern: ^\s*SESSION_COOKIE_SECURE\s*=\s*False
  severity: warning
  suggestion: Set SESSION_COOKIE_SECURE=True in production to restrict to HTTPS
- category: security
  id: session-cookie-no-httponly
  message: SESSION_COOKIE_HTTPONLY=False — session cookie accessible to JavaScript
  pattern: ^\s*SESSION_COOKIE_HTTPONLY\s*=\s*False
  severity: warning
  suggestion: Set SESSION_COOKIE_HTTPONLY=True to prevent XSS-based session theft
- category: security
  id: bind-all-interfaces
  message: Flask app binding to 0.0.0.0 — exposed to all network interfaces
  pattern: \.run\s*\([^)]*host\s*=\s*['"]0\.0\.0\.0['"]
  severity: warning
  suggestion: Bind to 127.0.0.1 for local dev or use a reverse proxy in production
- category: security
  id: django-raw-fstring
  message: Django .raw() with f-string — SQL injection via string interpolation
  pattern: \.raw\s*\(\s*f['"]
  severity: critical
  suggestion: "Use .raw() with params: Model.objects.raw('SELECT ... WHERE id = %s', [user_id])"
- category: security
  id: django-rawsql-format
  message: RawSQL() with .format() or f-string — SQL injection risk
  pattern: RawSQL\s*\(\s*(?:f['"]|['"][^'"]*['"]\.format\s*\()
  severity: critical
  suggestion: Use RawSQL with %s placeholders and pass params as second argument
- category: security
  id: django-extra-fstring
  message: QuerySet.extra() with f-string or .format() — SQL injection
  pattern: \.extra\s*\([^)]*(?:f['"]|\.format\s*\()
  severity: critical
  suggestion: Use Django ORM methods (annotate, filter) instead of extra() with interpolation
- category: security
  id: flask-debug-production
  message: Flask app.run(debug=True) should never reach production
  pattern: app\.run\s*\([^)]*debug\s*=\s*True
  severity: warning
  suggestion: Use environment variable to control debug mode, never hardcode True
- category: security
  id: flask-secret-hardcoded
  message: Flask secret_key set to a hardcoded string literal
  pattern: app\.secret_key\s*=\s*['"][^'"]{1,}['"]
  severity: critical
  suggestion: Load secret_key from environment variable or secrets manager
- category: security
  id: fastapi-debug-docs
  message: FastAPI docs enabled by default — may expose API surface in production
  pattern: FastAPI\s*\([^)]*docs_url\s*=\s*(?!None)
  severity: info
  suggestion: Set docs_url=None and redoc_url=None in production
- category: security
  id: fastapi-cors-wildcard
  message: CORSMiddleware with allow_origins=['*'] — unrestricted cross-origin access
  pattern: CORSMiddleware[^)]*allow_origins\s*=\s*\[\s*['"]?\*['"]?\s*\]
  severity: warning
  suggestion: Specify explicit allowed origins instead of wildcard
- category: security
  id: fastapi-credentials-wildcard
  message: CORS allow_credentials=True with wildcard origins — credential leak risk
  pattern: CORSMiddleware[^)]*allow_credentials\s*=\s*True
  severity: warning
  suggestion: Never combine allow_credentials=True with allow_origins=['*']
- category: security
  id: sqlalchemy-execute-fstring
  message: SQLAlchemy execute() with f-string — SQL injection
  pattern: \.execute\s*\(\s*f['"]
  severity: critical
  suggestion: Use text() with bound parameters instead of f-string interpolation
- category: security
  id: sqlalchemy-execute-format
  message: SQLAlchemy execute() with .format() — SQL injection
  pattern: \.execute\s*\(\s*['"][^'"]*['"]\.format\s*\(
  severity: critical
  suggestion: Use text() with bound parameters instead of .format()
- category: security
  id: sqlalchemy-execute-concat
  message: SQLAlchemy execute() with string concatenation — SQL injection
  pattern: \.execute\s*\(\s*['"][^'"]*['"]\s*\+
  severity: critical
  suggestion: Use text() with bound parameters instead of string concatenation
- category: security
  id: sqlalchemy-text-format
  message: SQLAlchemy text() with .format() — SQL injection
  pattern: text\s*\(\s*['"][^'"]*['"]\.format\s*\(
  severity: critical
  suggestion: "Use text() with :param bindparams: text('SELECT ... WHERE id = :id').bindparams(id=val)"
- category: security
  id: crypto-static-iv
  message: Static or hardcoded IV/nonce — defeats the purpose of initialization vectors
  pattern: (?<![a-zA-Z])(?:iv|nonce|IV|NONCE)\s*=\s*b?['"][^'"]{1,}['"]
  severity: warning
  suggestion: Generate a random IV/nonce for each encryption operation using os.urandom()
- category: security
  id: crypto-weak-pbkdf2
  message: PBKDF2 with low iteration count — vulnerable to brute force
  pattern: PBKDF2\w*\s*\([^)]*iterations\s*=\s*(?:[1-9]\d{0,4}|[1-9]\d{4})\b(?!\d)
  severity: warning
  suggestion: Use at least 600000 iterations (OWASP 2023 recommendation for PBKDF2-SHA256)
- category: security
  id: crypto-md5-hmac
  message: HMAC with MD5 — weak hash undermines message authentication
  pattern: hmac\.new\s*\([^)]*(?:hashlib\.md5|['"]md5['"])
  severity: warning
  suggestion: Use hmac.new(key, msg, hashlib.sha256)
- category: security
  id: file-open-fstring
  message: open() with f-string path — potential path injection if variables are user-controlled
  pattern: \bopen\s*\(\s*f['"]
  severity: info
  suggestion: Validate and sanitize file paths, use os.path.realpath() to resolve symlinks
- category: security
  id: file-world-writable
  message: File created with world-writable permissions (0o777 or 0o666)
  pattern: os\.(?:chmod|open|mkdir)\s*\([^)]*0o?(?:777|666)\b
  severity: warning
  suggestion: Use restrictive permissions (0o600 for files, 0o700 for directories)
- category: security
  id: file-mkdtemp-ignore
  message: tempfile.mkdtemp() return value ignored — temp directory never cleaned up
  pattern: ^\s*tempfile\.mkdtemp\s*\(
  severity: info
  suggestion: Assign return value and clean up with shutil.rmtree() or use tempfile.TemporaryDirectory()
- category: security
  id: ssl-no-hostname-check
  message: SSL context with hostname checking disabled — MITM risk
  pattern: check_hostname\s*=\s*False
  severity: warning
  suggestion: Keep check_hostname=True (default) for proper SSL verification
- category: security
  id: ftp-no-tls
  message: FTP login without TLS — credentials transmitted in cleartext
  pattern: ftplib\.FTP\s*\([^)]*\).*\.login\s*\(
  severity: warning
  suggestion: Use ftplib.FTP_TLS and call prot_p() for encrypted data transfer
- category: security
  id: timing-attack-comparison
  message: String comparison for secret/token — vulnerable to timing attacks
  pattern: (?:password|secret|token|api_key|hmac|signature|digest)\s*(?:==|!=)\s*(?!['"]$|None|True|False)
  severity: warning
  suggestion: Use hmac.compare_digest() for constant-time comparison
- category: security
  id: hardcoded-jwt-secret
  message: JWT encode/decode with hardcoded secret string
  pattern: jwt\.(?:encode|decode)\s*\([^)]*['"][A-Za-z0-9+/=_\-]{8,}['"]
  severity: critical
  suggestion: Load JWT secret from environment variable or key management system
- category: security
  id: weak-bcrypt-rounds
  message: bcrypt with low work factor — insufficient against modern GPUs
  pattern: bcrypt\.(?:gensalt|hashpw)\s*\([^)]*rounds\s*=\s*(?:[1-9]|1[01])\b
  severity: warning
  suggestion: Use at least 12 rounds for bcrypt (OWASP recommendation)
- category: security
  id: lxml-parse-untrusted
  message: lxml XMLParser without safe settings — potential XXE
  pattern: lxml\.etree\.(?:XMLParser|HTMLParser)\s*\(\s*\)
  severity: warning
  suggestion: Use lxml.etree.XMLParser(resolve_entities=False, no_network=True)
- category: security
  id: elementtree-defused
  message: xml.etree.ElementTree does not protect against entity expansion attacks
  pattern: (?:from\s+xml\.etree\s+import\s+ElementTree|import\s+xml\.etree\.ElementTree)
  severity: info
  suggestion: Use defusedxml.ElementTree instead for untrusted XML input
- category: security
  id: subprocess-popen-concat
  message: Popen with string concatenation — command injection risk
  pattern: subprocess\.Popen\s*\(\s*(?:['"][^'"]*['"]\s*\+|\w+\s*\+\s*['"])
  severity: critical
  suggestion: Pass command as a list of arguments, never concatenate strings
- category: security
  id: subprocess-shell-user-input
  message: subprocess with shell=True using request/input data — command injection
  pattern: subprocess\.\w+\([^)]*(?:request\.|input\(|sys\.argv|args\.).*shell\s*=\s*True
  severity: critical
  suggestion: Never pass user input to shell commands — use a list of arguments without shell=True
- category: security
  id: boto3-hardcoded-key
  message: boto3 client/resource with hardcoded AWS credentials
  pattern: boto3\.(?:client|resource|Session)\s*\([^)]*(?:aws_access_key_id|aws_secret_access_key)\s*=\s*['"]
  severity: critical
  suggestion: Use IAM roles, environment variables, or AWS credential providers
- category: security
  id: s3-public-acl
  message: S3 object or bucket with public ACL — data exposure risk
  pattern: ACL\s*=\s*['"](?:public-read|public-read-write|authenticated-read)['"]
  severity: warning
  suggestion: Use private ACL and grant access via IAM policies or pre-signed URLs
- category: security
  id: lambda-env-secret
  message: Lambda function with secrets in environment variables — visible in console and logs
  pattern: (?i)(?:Environment|environment)\s*=\s*\{[^}]*Variables[^}]*(?:PASSWORD|SECRET|TOKEN|API_KEY)
  severity: warning
  suggestion: Use AWS Secrets Manager or SSM Parameter Store for Lambda secrets
- category: security
  id: log-credit-card
  message: Logging potentially sensitive data — credit card, SSN
  pattern: (?i)(?:logger|logging)\.\w+\s*\(.*\b(?:credit.?card|card.?number|cvv|ssn|social.?security)\b
  severity: warning
  suggestion: Redact or mask sensitive values before logging
- category: security
  id: log-password-interpolation
  message: Password or credential value interpolated into log message
  pattern: (?i)(?:logger|logging)\.\w+\s*\(\s*f['"].*\{(?:password|passwd|secret|token|api_key|credential)
  severity: warning
  suggestion: Never include raw credentials in log messages — log events, not secrets
- category: security
  id: marshal-loads-unsafe
  message: marshal.loads() can crash interpreter or execute code — unsafe for untrusted data
  pattern: \bmarshal\.loads?\s*\(
  severity: critical
  suggestion: Use json.loads() for untrusted data — marshal is only safe for trusted bytecode
- category: security
  id: code-interactive-console
  message: code.InteractiveConsole/interact() allows arbitrary code execution
  pattern: \bcode\.(?:InteractiveConsole|InteractiveInterpreter|interact)\s*\(
  severity: critical
  suggestion: Remove interactive consoles from production code
- category: security
  id: dunder-import-dynamic
  message: __import__() with variable argument — arbitrary module loading
  pattern: __import__\s*\(\s*(?![bruf]*['\"])\w+
  severity: warning
  suggestion: Validate module names against an allowlist before importing
- category: security
  id: globals-manipulation
  message: globals()/locals() manipulation — can overwrite variables or bypass checks
  pattern: (?:globals|locals)\s*\(\s*\)\s*\[
  severity: warning
  suggestion: Use explicit variable assignment instead of manipulating globals/locals
- category: security
  id: getattr-user-input
  message: getattr() with user-controlled attribute name — attribute injection
  pattern: getattr\s*\(\s*\w+\s*,\s*(?:request\.|input\(|sys\.argv|args\.)
  severity: warning
  suggestion: Validate attribute names against an allowlist
- category: security
  id: setattr-dynamic
  message: setattr() with dynamic attribute name — can overwrite critical attributes
  pattern: setattr\s*\(\s*\w+\s*,\s*(?![bruf]*['\"])\w+
  severity: info
  suggestion: Validate attribute names against an allowlist before setting
- category: security
  id: pydantic-arbitrary-types
  message: Pydantic model with arbitrary_types_allowed — bypasses type validation
  pattern: arbitrary_types_allowed\s*=\s*True
  severity: info
  suggestion: Define proper validators for custom types instead of allowing arbitrary types
- category: security
  id: password-in-url
  message: Password embedded in URL string — visible in logs, browser history, referrer
  pattern: (?i)['"]https?://[^'"]*:[^@'"]+@
  severity: warning
  suggestion: Pass credentials via headers, environment variables, or auth parameters
- category: security
  id: class-manipulation
  message: __class__ assignment — type confusion and security check bypass
  pattern: __class__\s*=
  severity: warning
  suggestion: Avoid runtime __class__ reassignment — use proper inheritance or composition
- category: security
  id: subprocess-env-path
  message: subprocess call with modified PATH in env — binary hijacking risk
  pattern: subprocess\.\w+\s*\([^)]*env\s*=\s*\{[^}]*['"]PATH['"]
  severity: info
  suggestion: Use absolute paths for executables instead of modifying PATH
- category: security
  id: xml-sax-parser
  message: xml.sax.make_parser() without entity expansion limits — billion laughs DoS
  pattern: xml\.sax\.make_parser\s*\(
  severity: warning
  suggestion: Use defusedxml.sax instead, which limits entity expansion
- category: security
  id: pickle-from-request
  message: Deserializing pickle data from request — remote code execution
  pattern: pickle\.loads?\s*\(\s*(?:request\.|flask\.request\.)
  severity: critical
  suggestion: Never deserialize pickle from untrusted sources — use JSON
- category: security
  id: unvalidated-file-upload
  message: File upload saved without content type or extension validation
  pattern: (?:request\.files|UploadFile)\[?[^]]*\]?\.save\s*\(
  severity: warning
  suggestion: Validate file extension, content type, and size before saving uploads
- category: security
  id: raw-html-response
  message: Returning raw HTML string — XSS risk if content includes user input
  pattern: (?:return|Response)\s*\(\s*f['"]<
  severity: warning
  suggestion: Use a template engine with auto-escaping instead of raw HTML strings
- category: security
  id: dns-rebinding-risk
  message: Socket connection to user-supplied host — DNS rebinding risk
  pattern: socket\.(?:create_connection|connect)\s*\(\s*\(\s*(?![bruf]*['\"])\w+
  severity: info
  suggestion: Resolve hostname once and validate IP against allowlist before connecting
- category: security
  id: shelve-open-unsafe
  message: shelve.open() uses pickle internally — unsafe for untrusted data
  pattern: \bshelve\.open\s*\(
  severity: warning
  suggestion: Use sqlite3 or json for persistent storage of untrusted data
- category: security
  id: dill-loads-unsafe
  message: dill.loads() can execute arbitrary code like pickle
  pattern: \bdill\.loads?\s*\(
  severity: critical
  suggestion: Use json or msgpack for deserializing untrusted data
- category: security
  id: s3-no-encryption
  message: S3 put_object without server-side encryption specified
  pattern: \.put_object\s*\([^)]*(?!ServerSideEncryption)
  severity: info
  suggestion: Add ServerSideEncryption='aws:kms' or 'AES256' to encrypt data at rest
- category: security
  id: crypto-ecb-aes-new
  message: AES.new() in ECB mode — identical plaintext blocks produce identical ciphertext
  pattern: AES\.new\s*\([^)]*AES\.MODE_ECB
  severity: warning
  suggestion: Use AES.MODE_GCM or AES.MODE_CBC with random IV
- category: security
  id: hashlib-new-weak
  message: hashlib.new() with weak algorithm name from variable — may resolve to MD5/SHA1
  pattern: hashlib\.new\s*\(\s*(?![bruf]*['\"])\w+
  severity: info
  suggestion: Validate algorithm name against allowlist of strong algorithms (sha256, sha384, sha512)
- category: security
  id: os-link-toctou
  message: os.link/symlink with user-controlled path — symlink race condition
  pattern: os\.(?:symlink|link)\s*\(\s*(?![bruf]*['\"])\w+
  severity: info
  suggestion: Validate source and destination paths, use os.path.realpath() to resolve links
- category: security
  id: tempfile-predictable-name
  message: tempfile with predictable prefix/suffix — may enable targeted attacks
  pattern: tempfile\.(?:NamedTemporaryFile|mkstemp|mkdtemp)\s*\([^)]*(?:prefix|suffix)\s*=\s*(?![bruf]*['\"])\w+
  severity: info
  suggestion: Use random or default prefix/suffix, never user-controlled values
- category: security
  id: python-http-server
  message: http.server is not designed for production — no auth, no TLS, directory traversal risks
  pattern: (?:http\.server\.HTTPServer|HTTPServer|SimpleHTTPRequestHandler|BaseHTTPRequestHandler)\s*\(
  severity: warning
  suggestion: Use a production WSGI/ASGI server (gunicorn, uvicorn) behind a reverse proxy
- category: security
  id: jwt-none-algorithm
  message: JWT with 'none' algorithm — signature verification bypassed entirely
  pattern: (?i)jwt\.(?:encode|decode)\s*\([^)]*algorithm[s]?\s*=\s*(?:\[?\s*['"]none['"]\s*\]?|['"]none['"])
  severity: critical
  suggestion: Always use a strong signing algorithm (RS256, ES256) and verify signatures
- category: security
  id: re-dos-quantifier
  message: Nested quantifiers in regex — potential ReDoS (catastrophic backtracking)
  pattern: re\.compile\s*\(\s*[bruf]*['"][^'"]*(?:\+\+|\*\*|\+\*|\*\+|\{\d+,\}\+|\{\d+,\}\*)[^'"]*['"]
  severity: warning
  suggestion: Simplify nested quantifiers or use atomic groups / possessive quantifiers
- category: security
  id: async-subprocess-shell
  message: asyncio subprocess with shell=True — async command injection risk
  pattern: asyncio\.create_subprocess_shell\s*\(
  severity: warning
  suggestion: Use asyncio.create_subprocess_exec() with argument list instead
- category: security
  id: signal-handler-unsafe
  message: Signal handler calling non-reentrant function — undefined behavior risk
  pattern: signal\.signal\s*\([^)]*(?:os\.system|subprocess|open\()
  severity: warning
  suggestion: Only set a flag in signal handlers, process in main loop
- category: security
  id: aiohttp-no-verify
  message: aiohttp with ssl=False disables certificate verification
  pattern: (?:aiohttp\.ClientSession|session)\.(?:get|post|put|delete|patch)\s*\([^)]*ssl\s*=\s*False
  severity: warning
  suggestion: Remove ssl=False to enable certificate verification
- category: security
  id: urllib3-no-verify
  message: urllib3 with cert_reqs disabled — no SSL certificate verification
  pattern: urllib3\.(?:PoolManager|HTTPSPoolManager)\s*\([^)]*cert_reqs\s*=\s*['"]?(?:CERT_NONE|NONE)
  severity: warning
  suggestion: Use cert_reqs='CERT_REQUIRED' for proper SSL verification
- category: security
  id: xml-parse-untrusted
  message: xmlrpc client/server — XML-RPC is vulnerable to XXE and deserialization attacks
  pattern: \bxmlrpc\.(?:client|server)\.\w+\s*\(
  severity: info
  suggestion: Consider using JSON-RPC or REST APIs instead of XML-RPC
- category: security
  id: multiprocessing-pickle
  message: multiprocessing uses pickle for IPC — unsafe if processes handle untrusted data
  pattern: multiprocessing\.(?:Queue|Pipe|Pool|Manager)\s*\(
  severity: info
  suggestion: Validate data before sending through multiprocessing channels
- category: security
  id: werkzeug-debugger
  message: Werkzeug debugger pin — interactive debugger exposed in production is RCE
  pattern: (?:werkzeug|debugger).*(?:use_debugger|use_reloader)\s*=\s*True
  severity: critical
  suggestion: Never enable Werkzeug debugger in production — it provides a Python shell
# ── Prompt Injection (LLM SDK) ────────────────────────────────────
- category: security
  id: prompt-injection-openai-fstring
  message: OpenAI API call with f-string interpolation — prompt injection if user data is interpolated
  pattern: (?:chat\.completions\.create|ChatCompletion\.create)\s*\([^)]*f['"]
  severity: critical
  suggestion: Pass user content via the 'user' role message; never interpolate into system messages
- category: security
  id: prompt-injection-openai-format
  message: OpenAI API call with .format() in message content — prompt injection risk
  pattern: (?:chat\.completions\.create|ChatCompletion\.create)\s*\([^)]*\.format\s*\(
  severity: critical
  suggestion: Use structured messages with role separation; never format user input into prompts
- category: security
  id: prompt-injection-anthropic-fstring
  message: Anthropic API call with f-string interpolation — prompt injection risk
  pattern: (?:client\.messages\.create|messages\.create)\s*\([^)]*f['"]
  severity: critical
  suggestion: Use structured message content blocks; separate system from user content
- category: security
  id: prompt-injection-anthropic-format
  message: Anthropic API call with .format() in message content — prompt injection risk
  pattern: (?i)messages\.create\s*\([\s\S]{0,300}['"][^'"]*['"]\.format\s*\(
  severity: critical
  suggestion: Use validated inputs; never format user data into Anthropic message content
  flags: [DOTALL]
- category: security
  id: prompt-injection-anthropic-concat
  message: Anthropic API call with string concatenation in message content — prompt injection risk
  pattern: (?i)messages\.create\s*\([\s\S]{0,300}['\"]content['\"]\s*:\s*['"][^'"]*['"]\s*\+
  severity: critical
  suggestion: Use validated inputs; never concatenate user data into Anthropic message content
  flags: [DOTALL]
- category: security
  id: prompt-injection-langchain-fstring
  message: LangChain prompt template constructed with f-string — prompt injection risk
  pattern: (?:LLMChain|ChatPromptTemplate|PromptTemplate|SystemMessagePromptTemplate|HumanMessagePromptTemplate)\s*\([^)]*f['"]
  severity: critical
  suggestion: Use LangChain's input_variables for parameterized templates instead of f-string interpolation
- category: security
  id: prompt-injection-langchain-system-var
  message: LangChain prompt template with variable in system/instruction position — injection if user-controlled
  pattern: (?:SystemMessagePromptTemplate|SystemMessage)\s*\(\s*(?:content\s*=\s*)?(?:f['"]|['"][^'"]*['"]\.format\s*\(|['"][^'"]*['"]\s*\+)
  severity: critical
  suggestion: System messages must be static strings; use input_variables only for user content fields
- category: security
  id: prompt-injection-litellm
  message: LiteLLM completion call with f-string — prompt injection risk
  pattern: litellm\.completion\s*\([^)]*f['"]
  severity: critical
  suggestion: Construct messages array with proper role separation; never interpolate user input
- category: security
  id: prompt-injection-genai
  message: Google GenerativeAI API call with f-string — prompt injection risk
  pattern: (?:genai\.GenerativeModel|model\.generate_content|model\.start_chat)\s*\([^)]*f['"]
  severity: critical
  suggestion: Validate and sanitize input before passing to generate_content()
- category: security
  id: prompt-injection-cohere
  message: Cohere API call with f-string — prompt injection risk
  pattern: (?:co\.chat|co\.generate|client\.chat)\s*\([^)]*f['"]
  severity: critical
  suggestion: Validate user input before passing to Cohere API calls
- category: security
  id: prompt-injection-llamaindex-fstring
  message: LlamaIndex prompt template with f-string — prompt injection risk
  pattern: (?:PromptTemplate|ChatMessage|Prompt)\s*\(\s*(?:template\s*=\s*)?f['"]
  severity: critical
  suggestion: Use LlamaIndex's template variables for user content; keep system prompts static
- category: security
  id: prompt-injection-jinja-prompt
  message: Jinja2 template constructed from variable for prompt generation — template injection + prompt injection
  pattern: (?:jinja2\.Template|Environment\(\)\.from_string)\s*\(\s*(?!['\"]).*(?:prompt|system|instruction|message)
  severity: critical
  suggestion: Use pre-defined template files; never construct Jinja2 templates from user-controlled strings for LLM prompts
- category: security
  id: prompt-injection-request-to-llm
  message: HTTP request data passed to LLM API without visible validation — prompt injection risk
  pattern: (?:request\.(?:form|args|json|data|get_json)\s*(?:\[|\.get))[^;]*(?:chat\.completions\.create|messages\.create|completion|generate_content|\.invoke|\.run|\.predict)
  severity: warning
  suggestion: Validate, sanitize, and length-limit user input before passing to LLM; use allowlists where possible
  flags: [DOTALL]
- category: security
  id: prompt-injection-email-to-prompt
  message: Email content loaded into LLM prompt — classic indirect prompt injection vector
  pattern: (?i)(?:email|mail|imap|pop3).*(?:\.get_payload|\.body|\.text|\.content)[\s\S]{0,200}(?:prompt|messages|context)\s*(?:=|\+=)
  severity: warning
  suggestion: Emails are untrusted by definition; sanitize aggressively and instruct the model to ignore embedded instructions
  flags: [DOTALL]
- category: security
  id: prompt-injection-scrape-to-prompt
  message: Scraped web content used in LLM prompt — attacker-controlled HTML can contain injections
  pattern: (?:BeautifulSoup|Selector|\.select\(|\.find_all\()[\s\S]{0,300}(?:prompt|messages|content|context)\s*(?:=|\+=|\.append)
  severity: warning
  suggestion: Strip HTML tags, sanitize content, and use delimiter-based prompt isolation before including in prompts
  flags: [DOTALL]
- category: security
  id: llm-output-to-exec
  message: LLM output passed to exec/eval/subprocess — AI-generated code execution risk
  pattern: (?:exec|eval|subprocess\.run|os\.system|os\.popen)\s*\(\s*(?:response|completion|result|output|generated|answer|reply|chunk|delta|stream)
  severity: critical
  suggestion: Never execute LLM output directly; sandbox generated code or validate against an allowlist
- category: security
  id: llm-output-to-sql
  message: LLM output used in SQL query — SQL injection via AI-generated content
  pattern: (?:\.execute|\.raw|cursor\.)\s*\(\s*(?:response|completion|result|output|generated|answer|chunk|delta|stream)
  severity: critical
  suggestion: Never pass LLM output to SQL queries; validate and parameterize any AI-generated query components
- category: security
  id: llm-output-to-file
  message: LLM output used as file path — path traversal via AI-generated content
  pattern: (?:open|Path)\s*\(\s*(?:response|completion|result|output|generated|answer|reply|chunk|delta|stream)
  severity: critical
  suggestion: Never use LLM output as file paths; validate against an allowlist of safe paths
- category: security
  id: llm-output-to-html
  message: LLM output rendered as HTML template — XSS and SSTI via AI-generated content
  pattern: (?:render_template_string|Markup|mark_safe)\s*\(\s*(?:response|completion|result|output|generated|answer|reply|chunk|delta|stream)
  severity: critical
  suggestion: Use textContent or escape LLM output before rendering as HTML
- category: security
  id: llm-output-to-import
  message: LLM output used in dynamic import — arbitrary module loading
  pattern: (?:importlib\.import_module|__import__)\s*\(\s*(?:response|completion|result|output|generated|answer|reply|chunk|delta|stream)
  severity: critical
  suggestion: Never import modules based on LLM output; use a fixed allowlist
- category: security
  id: llm-output-to-pickle
  message: LLM output deserialized with pickle — remote code execution
  pattern: pickle\.loads?\s*\(\s*(?:response|completion|result|output|generated|answer|reply|chunk|delta|stream)
  severity: critical
  suggestion: Never deserialize LLM output with pickle; use json.loads() with schema validation
- category: security
  id: llm-no-refusal-check
  message: OpenAI response used without checking refusal field — may miss safety-triggered refusals
  pattern: (?:\.choices\[0\]\.message\.content|\.choices\[0\]\.text)(?![\s\S]{0,100}(?:refusal|finish_reason|stop_reason))
  severity: info
  suggestion: Check response.choices[0].message.refusal and finish_reason before using content
  flags: [DOTALL]
- category: security
  id: llm-rag-unsanitized-ingest
  message: Documents loaded directly into vector store without sanitization — RAG poisoning risk
  pattern: (?:SimpleDirectoryReader|DirectoryLoader|WebBaseLoader|TextLoader)\s*\(\s*(?:upload|user_|request\.|req\.)
  severity: warning
  suggestion: Sanitize and validate documents before ingesting into vector stores; strip potential injection payloads
- category: security
  id: llm-mcp-tool-shell
  message: MCP tool function contains shell execution — command injection if arguments are LLM-controlled
  pattern: (?:@(?:mcp\.tool|server\.tool|tool)\s*\(\s*\)[\s\S]{0,500})(?:os\.system|subprocess\.|os\.popen|exec\()
  severity: critical
  suggestion: Never use shell execution inside MCP tools; use parameterized operations with input validation
  flags: [DOTALL]
- category: security
  id: llm-mcp-tool-file-delete
  message: MCP tool function performs file deletion without confirmation — excessive agency
  pattern: (?:@(?:mcp\.tool|server\.tool|tool)\s*\(\s*\)[\s\S]{0,500})(?:os\.remove|os\.unlink|shutil\.rmtree|Path.*\.unlink)
  severity: warning
  suggestion: Require explicit user confirmation for destructive operations in MCP tools
  flags: [DOTALL]
