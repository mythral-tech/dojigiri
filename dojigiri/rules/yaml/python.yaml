rules:
- category: bug
  id: bare-except
  message: Bare except catches all exceptions including SystemExit and KeyboardInterrupt
  pattern: '^\s*except\s*:'
  severity: warning
  suggestion: Use 'except Exception:' to avoid catching KeyboardInterrupt/SystemExit
- category: bug
  id: mutable-default
  message: Mutable default argument — shared across all calls
  pattern: def\s+\w+\s*\([^)]*=\s*(?:\[\]|\{\}|set\(\))
  severity: warning
  suggestion: Use None as default and create inside function body
- category: style
  id: none-comparison
  message: Use 'is None' or 'is not None' instead of == / !=
  pattern: (?:==|!=)\s*None
  severity: warning
  suggestion: Replace with 'is None' or 'is not None'
- category: security
  id: eval-usage
  message: eval() can execute arbitrary code
  pattern: \beval\s*\(
  severity: critical
  suggestion: Use ast.literal_eval() for safe evaluation, or avoid entirely
- category: security
  id: exec-usage
  message: exec() can execute arbitrary code
  pattern: \bexec\s*\(
  severity: critical
  suggestion: Avoid exec() — restructure code to not need it
- category: bug
  id: open-without-with
  message: File opened without 'with' statement — may not be closed on error
  pattern: ^(?!\s*with\s)\s*\w+\s*=\s*open\s*\(
  severity: warning
  suggestion: Use 'with open(...) as f:' for automatic cleanup
- category: security
  id: os-system
  message: os.system() is vulnerable to shell injection
  pattern: \bos\.system\s*\(
  severity: warning
  suggestion: Use subprocess.run() with a list of arguments
- category: security
  id: shell-true
  message: subprocess with shell=True is vulnerable to injection
  pattern: subprocess\.\w+\([^)]*shell\s*=\s*True
  severity: warning
  suggestion: Pass command as a list without shell=True
- category: security
  id: subprocess-audit
  message: subprocess call — verify input is not constructed from untrusted data
  pattern: subprocess\.(?:run|call|check_call|check_output|Popen)\s*\((?!\s*\[)
  severity: info
  suggestion: Ensure command arguments are hardcoded or validated, never from raw user input
- category: style
  id: star-import
  message: Star import pollutes namespace and hides dependencies
  pattern: ^from\s+\S+\s+import\s+\*
  severity: warning
  suggestion: Import specific names instead
- category: bug
  id: assert-statement
  message: Assert statements are stripped with -O flag
  pattern: (?:^\s*|[;:]\s*)assert\s+
  severity: info
  suggestion: Use explicit if/raise for production checks
- category: style
  id: fstring-no-expr
  message: f-string without any expressions — unnecessary f prefix
  pattern: (?<!\w)f(['"])(?!\1\1)(?:(?:\\.|(?!\{)(?!\1)[^\\]))*\1
  severity: info
  suggestion: Remove the f prefix
- category: security
  id: pickle-unsafe
  message: pickle.load()/loads()/Unpickler() can execute arbitrary code during deserialization
  pattern: \bpickle\.(?:loads?\s*\(|Unpickler\s*\()
  severity: critical
  suggestion: Use json, msgpack, or a safe serialization format instead
- category: security
  id: pickle-unsafe
  message: Pickle-equivalent deserialization — can execute arbitrary code
  pattern: \b(?:dill|cloudpickle|shelve)\.loads?\s*\(
  severity: critical
  suggestion: Use json, msgpack, or a safe serialization format instead
- category: security
  id: pickle-unsafe
  message: jsonpickle can execute arbitrary code via crafted JSON
  pattern: \bjsonpickle\.(?:decode|loads?)\s*\(
  severity: critical
  suggestion: Use json.loads() for safe JSON deserialization
- category: security
  id: yaml-unsafe
  message: yaml.load() without SafeLoader can execute arbitrary code
  pattern: \byaml\.load\s*\(
  severity: critical
  suggestion: Use yaml.safe_load() or yaml.load(data, Loader=yaml.SafeLoader)
- category: security
  id: yaml-unsafe
  message: yaml.load_all()/unsafe_load() can execute arbitrary code
  pattern: \byaml\.(?:load_all|unsafe_load|unsafe_load_all)\s*\(
  severity: critical
  suggestion: Use yaml.safe_load_all() instead
- category: security
  id: weak-hash
  message: MD5/SHA1 are cryptographically weak hash algorithms
  pattern: \bhashlib\.(?:md5|sha1)\b|\bhashlib\.new\s*\(\s*['"](?:md5|sha1)['"]
  severity: warning
  suggestion: Use hashlib.sha256() or stronger for security-sensitive hashing
- category: security
  id: weak-random
  message: random module is not cryptographically secure
  pattern: \brandom\.(?:choice|randint|random|uniform|randrange|shuffle|sample)\s*\(
  severity: info
  suggestion: Use secrets module for security-sensitive random values
- category: security
  id: unsafe-deserialization
  message: marshal/shelve can execute arbitrary code during deserialization
  pattern: \b(?:marshal\.loads?\s*\(|shelve\.open\s*\()
  severity: critical
  suggestion: Use json or msgpack for untrusted data; shelve is pickle-backed
- category: security
  id: insecure-tempfile
  message: mktemp/tempnam/tmpnam are vulnerable to race conditions (TOCTOU)
  pattern: \b(?:tempfile\.mktemp\s*\(|os\.tempnam\s*\(|os\.tmpnam\s*\()
  severity: warning
  suggestion: Use tempfile.mkstemp() or tempfile.NamedTemporaryFile() instead
- category: security
  id: os-exec
  message: os.exec*() replaces the current process — verify arguments are trusted
  pattern: \bos\.exec(?:l|le|lp|lpe|v|ve|vp|vpe)\s*\(
  severity: warning
  suggestion: Use subprocess.run() for better control and input validation
- category: security
  id: os-spawn
  message: os.spawn*() spawns a new process — verify arguments are trusted
  pattern: \bos\.spawn(?:l|le|lp|lpe|v|ve|vp|vpe)\s*\(
  severity: warning
  suggestion: Use subprocess.run() for better control and input validation
- category: security
  id: os-popen
  message: os.popen() starts a shell process — vulnerable to injection
  pattern: \bos\.popen\s*\(
  severity: warning
  suggestion: Use subprocess.run() with a list of arguments instead
- category: security
  id: subprocess-shell
  message: subprocess.getoutput()/getstatusoutput() always uses shell — vulnerable to injection
  pattern: \bsubprocess\.(?:getoutput|getstatusoutput)\s*\(
  severity: warning
  suggestion: Use subprocess.run() with a list of arguments instead
- category: security
  id: os-startfile
  message: os.startfile() opens file with default handler — could launch executables
  pattern: \bos\.startfile\s*\(
  severity: warning
  suggestion: Validate file type and path before opening
- category: security
  id: insecure-file-permissions
  message: os.chmod() with overly permissive mode — world-writable or world-readable+executable
  pattern: \bos\.chmod\s*\([^)]*,\s*0o?[0-7](?:[1-35-7][0-7]|[0-7][1-35-7])\b
  severity: warning
  suggestion: Use restrictive permissions (e.g., 0o600 for owner-only read/write)
- category: security
  id: jinja2-autoescape-off
  message: Jinja2 Environment with autoescape disabled — XSS risk
  pattern: \bEnvironment\s*\(\s*\)|\bEnvironment\s*\([^)]*autoescape\s*=\s*False
  severity: warning
  suggestion: Use autoescape=True or select_autoescape() for HTML templates
- category: security
  id: pycrypto-deprecated
  message: pyCrypto is unmaintained and has known vulnerabilities
  pattern: from\s+Crypto(?:\.Cipher)?\s+import\s+
  severity: info
  suggestion: Switch to pycryptodome (same API, maintained fork)
- category: security
  id: ssl-wrap-socket
  message: ssl.wrap_socket() is deprecated and does not verify certificates by default
  pattern: \bssl\.wrap_socket\s*\(
  severity: warning
  suggestion: Use ssl.SSLContext.wrap_socket() with proper cert verification
- category: security
  id: requests-no-verify
  message: requests call with verify=False disables SSL certificate verification
  pattern: (?:requests|httpx)\.(?:get|post|put|delete|patch|head|options|request)\s*\([^)]*verify\s*=\s*False
  severity: warning
  suggestion: Remove verify=False to enable certificate verification (default behavior)
- category: security
  id: ssl-verify-disabled
  message: SSL certificate verification disabled — vulnerable to MITM attacks
  pattern: \.verify\s*=\s*False
  severity: warning
  suggestion: Enable certificate verification or use a custom CA bundle
- category: security
  id: ssl-verify-disabled
  message: ssl._create_unverified_context() disables all certificate verification
  pattern: \bssl\._create_unverified_context\s*\(
  severity: warning
  suggestion: Use ssl.create_default_context() for verified connections
- category: security
  id: ssl-verify-disabled
  message: ssl.CERT_NONE disables certificate verification — MITM risk
  pattern: \bssl\.CERT_NONE\b
  severity: warning
  suggestion: Use ssl.CERT_REQUIRED for certificate verification
- category: security
  id: hardcoded-tmp
  message: Hardcoded /tmp path — predictable location vulnerable to symlink attacks
  pattern: '[''"]\/(?:tmp|var\/tmp)\/'
  severity: info
  suggestion: Use tempfile.mkdtemp() or tempfile.NamedTemporaryFile() for secure temp files
- category: security
  id: hardcoded-password-default
  message: Default secret/password in function signature — visible in source and help()
  pattern: def\s+\w+\s*\([^)]*(?:password|secret|secret_key|api_key|token)\s*(?::\s*\w+\s*)?=\s*['"][^'"]+['"]
  severity: warning
  suggestion: Use None as default and require explicit argument or env var
- category: security
  id: debug-enabled
  message: DEBUG=True may expose sensitive information in production
  pattern: (?:^\s*DEBUG\s*=\s*True\b|\.run\s*\([^)]*debug\s*=\s*True)
  severity: warning
  suggestion: Set DEBUG=False in production and use environment variables
- category: security
  id: compile-usage
  message: compile() can compile arbitrary code — verify input is trusted
  pattern: \bcompile\s*\([^)]*,\s*['\"]<(?:string|input)>['\"]
  severity: warning
  suggestion: Use ast.literal_eval() for safe evaluation of data literals
- category: security
  id: regex-injection
  message: Regex pattern from variable — potential ReDoS if user-controlled
  pattern: \bre\.(?:compile|search|match|findall|sub|split)\s*\(\s*(?![bruf]*['\"])\w+
  severity: info
  suggestion: Use re.escape() on user input or set a timeout with regex module
- category: security
  id: http-connection-cleartext
  message: HTTPConnection uses unencrypted HTTP
  pattern: \bhttp\.client\.HTTPConnection\s*\(
  severity: warning
  suggestion: Use http.client.HTTPSConnection for encrypted connections
- category: security
  id: archive-slip
  message: Archive extractall() without path validation — zip/tar slip attack
  pattern: \b(?:zipfile\.ZipFile|ZipFile)\s*\([^)]*\).*\.extractall\s*\(|\.extractall\s*\(
  severity: warning
  suggestion: Validate member paths before extraction or use extraction filters
- category: security
  id: tarfile-open
  message: tarfile.open() — ensure extractall() uses data_filter or validates member paths
  pattern: \btarfile\.open\b
  severity: info
  suggestion: Use tf.extractall(filter='data') (Python 3.12+) or validate each member
- category: security
  id: unencrypted-ftp
  message: FTP transmits credentials and data in cleartext
  pattern: \bftplib\.FTP\s*\(
  severity: warning
  suggestion: Use ftplib.FTP_TLS or SFTP (paramiko) instead
- category: security
  id: unencrypted-telnet
  message: Telnet transmits everything in cleartext — inherently insecure
  pattern: \btelnetlib\.Telnet\s*\(
  severity: warning
  suggestion: Use SSH (paramiko) instead of telnet
- category: security
  id: smtp-cleartext
  message: SMTP connection may transmit credentials in cleartext
  pattern: \bsmtplib\.SMTP\s*\(
  severity: info
  suggestion: Use smtplib.SMTP_SSL or call starttls() immediately after connecting
- category: security
  id: webbrowser-open
  message: webbrowser.open() can open arbitrary URL schemes (file://, javascript:)
  pattern: \bwebbrowser\.open\s*\(
  severity: info
  suggestion: Validate the URL scheme against an allowlist before opening
- category: security
  id: ctypes-load-library
  message: Loading shared library via ctypes — arbitrary code execution if path is user-controlled
  pattern: \bctypes\.(?:cdll|windll|oledll)\.LoadLibrary\s*\(
  severity: warning
  suggestion: Validate library path against allowlist, never accept user input
- category: security
  id: rmtree-audit
  message: shutil.rmtree() recursively deletes — verify path is not user-controlled
  pattern: \bshutil\.rmtree\s*\(
  severity: info
  suggestion: Validate path against a safe base directory before deletion
- category: security
  id: dynamic-import
  message: Dynamic module import — arbitrary code execution if module name is user-controlled
  pattern: \bimportlib\.import_module\s*\(\s*(?![bruf]*['\"])\w+
  severity: info
  suggestion: Validate module name against an allowlist
- category: security
  id: env-path-injection
  message: Modifying LD_PRELOAD/PATH/PYTHONPATH — can enable code injection
  pattern: os\.environ\s*\[\s*['"](?:LD_PRELOAD|LD_LIBRARY_PATH|PATH|PYTHONPATH)['"]\s*\]\s*=
  severity: warning
  suggestion: Avoid modifying these environment variables at runtime
- category: security
  id: sys-path-modify
  message: sys.path modification — could enable module hijacking if path is untrusted
  pattern: \bsys\.path\.(?:insert|append)\s*\(
  severity: info
  suggestion: Avoid dynamic sys.path changes with untrusted paths
- category: security
  id: django-mark-safe
  message: mark_safe() bypasses Django's auto-escaping — XSS risk if content is user-controlled
  pattern: \bmark_safe\s*\(
  severity: warning
  suggestion: Use format_html() or escape user content before marking safe
- category: security
  id: django-extra-sql
  message: QuerySet.extra() uses raw SQL — injection risk if values are user-controlled
  pattern: \.extra\s*\(
  severity: warning
  suggestion: Use Django ORM methods (filter, annotate) instead of extra()
- category: security
  id: paramiko-auto-add-policy
  message: AutoAddPolicy() accepts unknown SSH host keys — vulnerable to MITM attacks
  pattern: \bparamiko\.AutoAddPolicy\s*\(
  severity: warning
  suggestion: Use RejectPolicy or manually verify host keys
- category: security
  id: paramiko-exec-command
  message: SSH exec_command — verify command is not constructed from user input
  pattern: \.exec_command\s*\(
  severity: info
  suggestion: Validate and sanitize command arguments, use allowlist of commands
- category: security
  id: weak-rsa-key
  message: RSA key size < 2048 bits is considered breakable
  pattern: key_size\s*=\s*(?:512|768|1024)\b
  severity: warning
  suggestion: Use key_size=2048 or higher (NIST recommends >= 2048)
- category: security
  id: insecure-crypto
  message: TripleDES/3DES is deprecated — slow and approaching theoretical breaks
  pattern: \bTripleDES\b|\b3DES\b|\bDES3\b
  severity: warning
  suggestion: Use AES-256 or ChaCha20 instead
- category: security
  id: hardcoded-secret-key
  message: SECRET_KEY hardcoded in source — session hijacking and forgery risk
  pattern: ^\s*SECRET_KEY\s*=\s*['"][A-Za-z0-9+/=_\-!@#$%^&*]{8,}['"]
  severity: critical
  suggestion: Load SECRET_KEY from environment variable or secrets manager
- category: security
  id: csrf-middleware-disabled
  message: CsrfViewMiddleware not found in MIDDLEWARE — CSRF protection disabled
  pattern: (?:MIDDLEWARE(?:_CLASSES)?)\s*=\s*\[(?:[^\]]*?)(?!.*CsrfViewMiddleware).*?\]
  severity: warning
  suggestion: Add 'django.middleware.csrf.CsrfViewMiddleware' to MIDDLEWARE
- category: security
  id: csrf-exempt
  message: '@csrf_exempt disables CSRF protection on this view'
  pattern: '@csrf_exempt\b'
  severity: warning
  suggestion: Remove @csrf_exempt or implement alternative CSRF validation
- category: security
  id: django-allowed-hosts-wildcard
  message: ALLOWED_HOSTS = ['*'] accepts any Host header — HTTP Host header attacks
  pattern: ALLOWED_HOSTS\s*=\s*\[\s*['\"]\*['\"]
  severity: warning
  suggestion: Set ALLOWED_HOSTS to specific domain names
- category: security
  id: django-raw-sql
  message: Raw SQL query — injection risk if parameters are not properly escaped
  pattern: \.raw\s*\(\s*(?!['\"]SELECT\s)(?!['\"]INSERT\s)|RawSQL\s*\(
  severity: warning
  suggestion: Use Django ORM queries or pass parameters via the params argument
- category: security
  id: unsafe-redirect
  message: Redirect target may be user-controlled — open redirect vulnerability
  pattern: \bredirect\s*\(\s*(?:request\.|f['\"]|[a-zA-Z_]\w*(?:\[|\.))
  severity: warning
  suggestion: Validate redirect URL against allowlist or use url_for()/reverse()
- category: security
  id: flask-send-file-traversal
  message: send_file() with user-controlled path — directory traversal risk
  pattern: \bsend_file\s*\(\s*(?:request\.|f['\"]|os\.path\.join\s*\([^)]*request\.)
  severity: warning
  suggestion: Use send_from_directory() with a fixed base directory instead
- category: security
  id: weak-tls-version
  message: Weak TLS protocol version — SSLv2/v3/TLS1.0/1.1 are broken or deprecated
  pattern: \bssl\.PROTOCOL_(?:SSLv2|SSLv3|SSLv23|TLSv1(?:_1)?)\b
  severity: critical
  suggestion: Use ssl.PROTOCOL_TLS_CLIENT or ssl.TLSVersion.TLSv1_2 minimum
- category: security
  id: weak-tls-version
  message: TLS minimum version set to deprecated protocol
  pattern: minimum_version\s*=\s*ssl\.TLSVersion\.(?:SSLv3|TLSv1(?:_1)?)\b
  severity: critical
  suggestion: Set minimum_version to ssl.TLSVersion.TLSv1_2 or TLSv1_3
- category: security
  id: weak-tls-version
  message: pyOpenSSL weak TLS method — use TLS 1.2+ only
  pattern: \bSSL\.(?:SSLv2_METHOD|SSLv3_METHOD|SSLv23_METHOD|TLSv1_METHOD|TLSv1_1_METHOD)\b
  severity: critical
  suggestion: Use SSL.TLSv1_2_METHOD or SSL.TLS_METHOD with proper options
- category: security
  id: weak-cipher-suite
  message: Weak cipher suite configured — RC4/DES/NULL/EXPORT/anon ciphers are broken
  pattern: set_ciphers\s*\(\s*['"](?:[^'"]*(?:RC4|DES|NULL|EXPORT|anon|eNULL|aNULL)[^'"]*)['"]\s*\)
  severity: critical
  suggestion: 'Use strong cipher suites: set_ciphers(''ECDHE+AESGCM:ECDHE+CHACHA20:DHE+AESGCM'')'
- category: security
  id: empty-password-check
  message: Comparing password against empty string — weak authentication logic
  pattern: (?:password|passwd|pass|secret)\s*(?:==|!=)\s*['"]["']
  severity: warning
  suggestion: Use proper password validation with minimum length/complexity requirements
- category: security
  id: empty-password-connection
  message: Connection with empty password string — authentication bypass risk
  pattern: \.connect\s*\([^)]*password\s*=\s*['"]["']
  severity: warning
  suggestion: Require non-empty password from secure credential store
- category: security
  id: cors-wildcard
  message: CORS wildcard allows any origin — credentials and data may leak cross-origin
  pattern: (?:Access-Control-Allow-Origin|CORS_ORIGIN_ALLOW_ALL|CORS_ALLOW_ALL_ORIGINS)\s*[:=]\s*(?:['\"]?\*['\"]?|True)
  severity: warning
  suggestion: Specify allowed origins explicitly via an allowlist
- category: security
  id: cors-wildcard
  message: Flask-CORS with default wildcard origin — all cross-origin requests allowed
  pattern: \bCORS\s*\(\s*\w+\s*(?:,\s*origins\s*=\s*['\"]?\*['\"]?)?(?:\s*\))
  severity: warning
  suggestion: Pass origins=['https://yourdomain.com'] to restrict allowed origins
- category: security
  id: security-header-disabled
  message: Security header explicitly disabled — browser protections weakened
  pattern: ^\s*(?:SECURE_BROWSER_XSS_FILTER|X_FRAME_OPTIONS|SECURE_CONTENT_TYPE_NOSNIFF)\s*=\s*False
  severity: warning
  suggestion: Set to True or remove the override to use Django's secure defaults
- category: security
  id: ssl-redirect-disabled
  message: SECURE_SSL_REDIRECT=False — HTTP traffic not redirected to HTTPS
  pattern: ^\s*SECURE_SSL_REDIRECT\s*=\s*False
  severity: info
  suggestion: Set SECURE_SSL_REDIRECT=True in production
- category: security
  id: pickle-unsafe
  message: cPickle/_pickle deserialization can execute arbitrary code
  pattern: \b(?:cPickle|_pickle)\.(?:loads?\s*\(|Unpickler\s*\()
  severity: critical
  suggestion: Use json or msgpack for untrusted data
- category: security
  id: zipfile-extract-audit
  message: Archive extract() — verify member path does not escape target directory
  pattern: \.extract\s*\(\s*(?!.*\bfilter\b)
  severity: info
  suggestion: Check that extracted path starts with intended directory (no ../ traversal)
- category: security
  id: session-cookie-insecure
  message: SESSION_COOKIE_SECURE=False — session cookie sent over HTTP
  pattern: ^\s*SESSION_COOKIE_SECURE\s*=\s*False
  severity: warning
  suggestion: Set SESSION_COOKIE_SECURE=True in production to restrict to HTTPS
- category: security
  id: session-cookie-no-httponly
  message: SESSION_COOKIE_HTTPONLY=False — session cookie accessible to JavaScript
  pattern: ^\s*SESSION_COOKIE_HTTPONLY\s*=\s*False
  severity: warning
  suggestion: Set SESSION_COOKIE_HTTPONLY=True to prevent XSS-based session theft
- category: security
  id: bind-all-interfaces
  message: Flask app binding to 0.0.0.0 — exposed to all network interfaces
  pattern: \.run\s*\([^)]*host\s*=\s*['"]0\.0\.0\.0['"]
  severity: warning
  suggestion: Bind to 127.0.0.1 for local dev or use a reverse proxy in production
