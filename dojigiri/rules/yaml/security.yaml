rules:
- category: security
  id: path-traversal
  message: Possible path traversal attack with ../
  pattern: (?:open|read|write|include)\s*\([^)]*\.\./
  severity: critical
  suggestion: Validate and sanitize file paths
- category: security
  id: private-key
  message: Private key found in source code
  pattern: '-----BEGIN (?:RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----'
  severity: critical
  suggestion: Remove immediately and rotate the key
- category: security
  id: db-connection-string
  message: Database connection string with embedded credentials
  pattern: (?i)(?:postgres(?:ql)?|mysql|mongodb(?:\+srv)?|redis|amqp|jdbc:[a-z]+)://[^:]+:[^@]+@
  severity: critical
  suggestion: Use environment variables for connection strings
- category: security
  id: logging-sensitive-data
  message: Possibly logging sensitive data (password, secret, token)
  pattern: (?i)(?:log(?:ger)?\.(?:info|debug|warn|error|critical|warning)|print|console\.log|puts)\s*\(.*\b(?:password|passwd|secret_key|api_key|auth_token|credential)\b
  severity: warning
  suggestion: Redact sensitive values before logging
- category: security
  id: logging-config-listen
  message: logging.config.listen() accepts config over network — can load arbitrary handler classes (RCE)
  pattern: logging\.config\.listen\s*\(
  severity: critical
  suggestion: Avoid network-based logging config; use file-based or environment-based config instead
- category: security
  id: insecure-des
  message: DES encryption is broken — 56-bit keys are trivially brute-forced
  pattern: \bDES\b\.new\(|\bDES\.(?:encrypt|decrypt)\b|from\s+Crypto\.Cipher\s+import\s+DES\b
  severity: warning
  suggestion: Use AES-256 or ChaCha20 instead
- category: security
  id: insecure-ecb-mode
  message: ECB mode does not hide data patterns — insecure for most uses
  pattern: (?i)(?:MODE_ECB|mode\s*=\s*['"]?ECB|\.ECB\b)
  severity: warning
  suggestion: Use CBC, GCM, or CTR mode instead
- category: security
  id: insecure-blowfish
  message: Blowfish has 64-bit blocks — vulnerable to birthday attacks at scale
  pattern: \bBlowfish\b\.new\(|\bBlowfish\.(?:encrypt|decrypt)\b|from\s+Crypto\.Cipher\s+import\s+Blowfish\b
  severity: warning
  suggestion: Use AES-256 or ChaCha20 instead
- category: security
  id: insecure-rc4
  message: RC4/ARC4 is a broken stream cipher with known biases
  pattern: \bARC4\b\.new\(|\bARC4\.(?:encrypt|decrypt)\b|from\s+Crypto\.Cipher\s+import\s+ARC4\b|\bRC4\b
  severity: warning
  suggestion: Use AES-GCM or ChaCha20-Poly1305 instead
- category: security
  id: requests-no-timeout
  message: HTTP request without timeout — can hang indefinitely
  pattern: requests\.(?:get|post|put|delete|patch|head|request)\s*\((?:(?!timeout)[^)])*\)
  severity: warning
  suggestion: Always pass timeout= to requests calls
  flags:
  - DOTALL
- category: security
  id: ssrf-risk
  message: HTTP request — verify URL is not constructed from user input (SSRF risk)
  pattern: (?:requests\.(?:get|post|put|delete|patch|head)\s*\(|urllib\.request\.urlopen\s*\(|http\.client\.HTTP\w*Connection\s*\(|fetch\s*\(\s*(?!['"]/)(?!url_for)|axios\.(?:get|post|put|delete)\s*\(|http\.Get\s*\(|http\.Post\s*\()(?!.*url_for\s*\()
  severity: warning
  suggestion: Validate URLs against an allowlist of domains/schemes before making requests
- category: security
  id: url-scheme-audit
  message: urlopen permits file:/ and custom schemes — verify URL scheme is restricted to https
  pattern: (?:urllib\.request\.urlopen\s*\(|urllib\.request\.urlretrieve\s*\(|urlopen\s*\()
  severity: warning
  suggestion: Validate URL scheme against allowlist (e.g., only https://) before opening
- category: security
  id: ssti-risk
  message: Template constructed from string — may allow server-side template injection
  pattern: (?<!def )(?:Template\s*\((?!\s*['"])|render_template_string\s*\((?!\s*['"])|from_string\s*\((?!\s*['"])|Environment\s*\(\s*\)\.from_string|Jinja2\s*\(.*\bstring\b|new\s+Function\s*\()
  severity: critical
  suggestion: Use pre-compiled templates from files, never from user-controlled strings
- category: security
  id: xxe-risk
  message: XML parsing — ensure external entities are disabled to prevent XXE attacks
  pattern: (?:xml\.etree\.ElementTree\.(?:parse|fromstring|iterparse)\s*\(|xml\.dom\.minidom\.(?:parse|parseString)\s*\(|xml\.sax\.(?:parse|parseString)\s*\(|lxml\.etree\.(?:parse|fromstring|iterparse)\s*\(|DocumentBuilderFactory|XMLReader|SAXParser|DOMParser\s*\(\)|ET\.(?:parse|fromstring|iterparse)\s*\(|etree\.(?:parse|fromstring|iterparse)\s*\(|minidom\.(?:parse|parseString)\s*\(|sax\.(?:parse|parseString)\s*\()
  severity: warning
  suggestion: Use defusedxml (Python), disable DTDs/external entities in parser config
- category: security
  id: jwt-insecure
  message: JWT decoded with insecure settings — disabled verification or 'none' algorithm
  pattern: (?:jwt\.decode\s*\([^)]*(?:algorithms\s*=\s*\[['"]none['"]\]|verify\s*=\s*False|options\s*=\s*\{[^}]*'verify_\w+'\s*:\s*False)|\.decode\s*\(\s*token[^)]*algorithm\s*=\s*['"](?:none|HS256)['"])
  severity: critical
  suggestion: Always verify JWT signatures with a strong algorithm (RS256/ES256) and validate claims
- category: security
  id: hardcoded-ip
  message: Hardcoded IP address — may break in different environments
  pattern: (?<!\d)(?!127\.0\.0\.1|0\.0\.0\.0|255\.255\.255\.255)(?:(?:25[0-5]|2[0-4]\d|1\d\d|[1-9]\d|\d)\.){3}(?:25[0-5]|2[0-4]\d|1\d\d|[1-9]\d|\d)(?!\d)
  severity: info
  suggestion: Use configuration files or environment variables for IP addresses
- category: security
  id: generic-bind-all-interfaces
  message: Binding to 0.0.0.0 exposes the service to all network interfaces
  pattern: (?:\.bind|\.run|start_server|HTTPServer|TCPServer|UDPServer|SimpleXMLRPCServer|ThreadingTCPServer|ForkingTCPServer|BaseManager|SyncManager)\s*\([^)]*['"]0\.0\.0\.0['"]|=\s*['"]0\.0\.0\.0['"]
  severity: warning
  suggestion: Bind to specific interface (127.0.0.1 for local-only, or configure via env var)
- category: security
  id: toctou-file-check
  message: File existence check before use — potential TOCTOU race condition
  pattern: \bos\.path\.(?:exists|isfile|isdir)\s*\(\s*\w+\s*\)
  severity: info
  suggestion: Use try/except around the file operation instead of checking first
- category: security
  id: weak-hash-md5
  message: MD5 is cryptographically broken — do not use for security
  pattern: (?i)\bmd5\s*\(|\bhashlib\.md5\b|\bMD5\.(?:Create|new|digest)\b|\bDigestUtils\.md5\b|MessageDigest\.getInstance\s*\(\s*['"]MD5['"]
  severity: warning
  suggestion: Use SHA-256 or SHA-3 for integrity; use bcrypt/scrypt/argon2 for passwords
- category: security
  id: weak-hash-sha1
  message: SHA1 is cryptographically weak — collision attacks demonstrated
  pattern: (?i)\bsha1\s*\(|\bhashlib\.sha1\b|\bSHA1\.(?:Create|new|digest)\b|\bDigestUtils\.sha1\b|MessageDigest\.getInstance\s*\(\s*['"]SHA-?1['"]
  severity: warning
  suggestion: Use SHA-256 or SHA-3 instead
- category: security
  id: generic-open-redirect
  message: Redirect to user-controlled URL — open redirect risk
  pattern: (?i)(?:redirect|location\.href|window\.location|res\.redirect)\s*(?:=|\()\s*(?:req\.|request\.|params\.|query\.)
  severity: warning
  suggestion: Validate redirect targets against an allowlist of trusted paths/domains
- category: security
  id: xss-innerhtml
  message: innerHTML assignment — XSS risk if value contains user input
  pattern: \.innerHTML\s*=\s*(?!['"]<)
  severity: warning
  suggestion: Use textContent for text, or sanitize HTML with DOMPurify
- category: security
  id: xss-document-write
  message: document.write() — XSS risk and blocks page rendering
  pattern: \bdocument\.write\s*\(
  severity: warning
  suggestion: Use DOM manipulation methods (createElement, textContent) instead
- category: security
  id: deserialization-unsafe
  message: Unsafe deserialization — can lead to remote code execution
  pattern: (?i)(?:pickle\.loads?\s*\(|yaml\.load\s*\([^)]*(?!Loader)|marshal\.loads?\s*\(|ObjectInputStream|unserialize\s*\(|readObject\s*\()
  severity: critical
  suggestion: Use safe deserialization (yaml.safe_load, JSON) or validate input
- category: security
  id: generic-debug-enabled
  message: Debug mode enabled — may expose sensitive information in production
  pattern: (?i)(?:DEBUG\s*=\s*True|debug\s*:\s*true|\.debug\s*=\s*true|app\.run\s*\([^)]*debug\s*=\s*True)
  severity: warning
  suggestion: Disable debug mode in production environments
- category: security
  id: generic-weak-tls-version
  message: Weak TLS version (< 1.2) — vulnerable to known attacks
  pattern: (?i)(?:SSLv[23]|TLSv1(?:\.0)?|TLS_1_0|TLS_1_1|PROTOCOL_TLSv1(?:_1)?)\b
  severity: warning
  suggestion: Use TLS 1.2 or 1.3 minimum
- category: security
  id: csrf-disabled
  message: CSRF protection disabled — cross-site request forgery risk
  pattern: (?i)(?:csrf_exempt|@csrf_exempt|WTF_CSRF_ENABLED\s*=\s*False|csrf\s*:\s*false|CSRF_COOKIE_SECURE\s*=\s*False)
  severity: warning
  suggestion: Enable CSRF protection for state-changing endpoints
- category: security
  id: session-insecure
  message: Session cookie without secure flags — may be intercepted
  pattern: (?i)(?:SESSION_COOKIE_SECURE\s*=\s*False|cookie_secure\s*=\s*false|secure\s*:\s*false|httponly\s*:\s*false)
  severity: warning
  suggestion: Set Secure, HttpOnly, and SameSite flags on session cookies
- category: security
  id: generic-password-in-url
  message: Password in URL — visible in logs, referrer headers, browser history
  pattern: (?i)(?:https?://[^:]+:[^@]+@(?!localhost))
  severity: critical
  suggestion: Use authentication headers instead of embedding credentials in URLs
- category: security
  id: insecure-ssl-context
  message: SSL context with no verification — MITM risk
  pattern: (?i)(?:ssl\.create_default_context\s*\([^)]*\)\s*\n\s*.*check_hostname\s*=\s*False|ssl\._create_unverified_context|CERT_NONE|verify_mode\s*=\s*ssl\.CERT_NONE)
  severity: critical
  suggestion: Enable certificate verification; configure proper CA certificates
- category: security
  id: directory-listing
  message: Directory listing or autoindex enabled — may expose sensitive files
  pattern: (?i)(?:autoindex\s+on|Options\s+\+?Indexes|directory_listing\s*[:=]\s*(?:true|on|enabled))
  severity: warning
  suggestion: Disable directory listing in web server configuration
- category: security
  id: file-upload-unrestricted
  message: File upload — verify file type, size, and name are validated
  pattern: (?i)(?:request\.files|uploaded_file|multipart|file_field|FileField|multer|formidable|busboy)
  severity: info
  suggestion: Validate file type (allowlist), enforce size limits, sanitize filenames
- category: security
  id: race-condition-mkdir
  message: mkdir without exist_ok — race condition between check and creation
  pattern: \bos\.makedirs?\s*\([^)]*\)\s*(?!.*exist_ok)
  severity: info
  suggestion: Use os.makedirs(path, exist_ok=True) to handle concurrent creation
- category: security
  id: mass-assignment
  message: Mass assignment — all request parameters passed to model/object
  pattern: (?i)(?:\.create\s*\(\s*\*\*request\.|\.update\s*\(\s*\*\*request\.|Object\.assign\s*\(\s*\w+\s*,\s*req\.body|\.set\s*\(\s*req\.body\))
  severity: warning
  suggestion: Explicitly list allowed parameters instead of passing all request data
- category: security
  id: header-injection
  message: HTTP header set from user input — header injection risk
  pattern: (?i)(?:set_header|add_header|response\.headers|setHeader)\s*\([^)]*(?:request\.|req\.|params\.|query\.)
  severity: warning
  suggestion: Validate and sanitize header values; reject newlines
- category: security
  id: ldap-injection
  message: LDAP query with string interpolation — injection risk
  pattern: (?i)(?:ldap_search|search_s|search_ext_s)\s*\([^)]*(?:format\s*\(|\+\s*\w+|f['"])
  severity: critical
  suggestion: Use parameterized LDAP queries; escape special characters
- category: security
  id: xpath-injection
  message: XPath query with string interpolation — injection risk
  pattern: (?i)(?:xpath|selectNodes|evaluate)\s*\(\s*(?:f['"]|['"].*?\+|['"].*?format\s*\()
  severity: critical
  suggestion: Use parameterized XPath queries or sanitize input
- category: security
  id: shell-injection
  message: Shell command constructed from string interpolation — injection risk
  pattern: (?i)(?:os\.system|os\.popen|subprocess\.(?:call|run|Popen)|exec|execSync|child_process)\s*\(\s*(?:f['"]|['"].*?\+|['"].*?format\s*\(|`[^`]*\$)
  severity: critical
  suggestion: Use parameterized command execution (subprocess with list args, no shell=True)
- category: security
  id: regex-dos
  message: Regex with nested quantifiers — potential ReDoS vulnerability
  pattern: (?:\(\.\*\)\+|\(\.\+\)\*|\(\[.*?\]\+\)\+|\(\.\*\)\{|\(\w\+\)\+)
  severity: warning
  suggestion: Simplify regex to avoid catastrophic backtracking; use atomic groups or possessive quantifiers
- category: security
  id: generic-insecure-cookie
  message: Cookie set without security flags
  pattern: (?i)(?:set_cookie|setCookie|document\.cookie)\s*(?:\(|=)(?!.*(?:secure|httponly|samesite))
  severity: warning
  suggestion: Set Secure, HttpOnly, and SameSite attributes on cookies
- category: security
  id: information-disclosure-stacktrace
  message: Stack trace or detailed errors exposed to client
  pattern: (?i)(?:traceback\.format_exc|traceback\.print_exc|e\.(?:getMessage|getStackTrace|printStackTrace)|Error\.stack)\s*(?:\(\)|;)
  severity: warning
  suggestion: Log errors server-side; return generic error messages to clients
- category: security
  id: crypto-ecb-java
  message: ECB mode in Java cipher — does not hide data patterns
  pattern: Cipher\.getInstance\s*\(\s*['"](?:AES|DES|DESede)(?:/ECB)?['"]
  severity: warning
  suggestion: Use AES/GCM/NoPadding or AES/CBC/PKCS5Padding with random IV
# ── Prompt Injection (LLM Security) ──────────────────────────────────
- category: security
  id: prompt-injection-fstring
  message: Prompt string built with f-string interpolation — prompt injection risk if variables contain user input
  pattern: (?i)(?:prompt|system_prompt|system_message|user_prompt|instructions|pre_prompt)\s*=\s*f['"]
  severity: warning
  suggestion: Build prompts with validated, sanitized inputs; never interpolate raw user data into system prompts
- category: security
  id: prompt-injection-format
  message: Prompt string built with .format() — prompt injection risk if arguments contain user input
  pattern: (?i)(?:prompt|system_prompt|system_message|user_prompt|instructions|pre_prompt)\s*=\s*['"][^'"]*['"]\.format\s*\(
  severity: warning
  suggestion: Use structured message arrays with role separation instead of string formatting
- category: security
  id: prompt-injection-concat
  message: Prompt string built with concatenation — prompt injection risk if concatenated value is user-controlled
  pattern: (?i)(?:prompt|system_prompt|system_message|user_prompt|instructions|context_prompt)\s*=\s*['"][^'"]*['"]\s*\+
  severity: warning
  suggestion: Separate system instructions from user content using the API's message/role structure
- category: security
  id: prompt-injection-percent
  message: Prompt string built with % formatting — prompt injection risk
  pattern: (?i)(?:prompt|system_prompt|system_message|user_prompt|instructions|pre_prompt)\s*=\s*['"][^'"]*%s[^'"]*['"]\s*%
  severity: warning
  suggestion: Use structured message arrays; never use % formatting to insert user data into prompts
- category: security
  id: prompt-injection-template-literal
  message: Prompt built with template literal interpolation — prompt injection risk if interpolated values are user-controlled
  pattern: (?i)(?:prompt|systemPrompt|systemMessage|userPrompt|instructions|contextPrompt)\s*=\s*`[^`]*\$\{
  severity: warning
  suggestion: Use structured message arrays with role separation; sanitize user content before inclusion
- category: security
  id: prompt-injection-content-fstring
  message: Message content field built with f-string — prompt injection regardless of variable naming
  pattern: (?i)['\"]content['\"]\s*:\s*f['"]
  severity: critical
  suggestion: Never interpolate user data into message content fields; use validated inputs only
- category: security
  id: prompt-injection-content-template
  message: Message content field built with template literal — prompt injection regardless of variable naming
  pattern: (?i)['\"]content['\"]\s*:\s*`[^`]*\$\{
  severity: critical
  suggestion: Never interpolate user data into message content fields; use validated inputs only
- category: security
  id: prompt-injection-system-role-fstring
  message: System role message with f-string content — user input in system prompt enables full prompt takeover
  pattern: (?i)['\"]role['\"]\s*:\s*['\"]system['\"][\s\S]{0,100}['\"]content['\"]\s*:\s*f['"]
  severity: critical
  suggestion: System prompts must contain only developer-controlled content; place user data in 'user' role messages only
  flags: [DOTALL]
- category: security
  id: prompt-injection-system-role-template
  message: System role message with template literal — prompt injection via system prompt
  pattern: (?i)role\s*:\s*['\"]system['\"][\s\S]{0,100}content\s*:\s*`[^`]*\$\{
  severity: critical
  suggestion: System prompts must be static strings; place user data in user role messages only
  flags: [DOTALL]
- category: security
  id: prompt-injection-url-to-prompt
  message: HTTP response content used in LLM prompt — indirect prompt injection via untrusted web content
  pattern: (?i)(?:requests\.get|httpx\.get|fetch|axios\.get|http\.Get)\s*\([^)]*\)[\s\S]{0,200}(?:prompt|messages|system_message|instruction)\s*(?:=|\+=|\.append|\.push)
  severity: warning
  suggestion: Sanitize and validate fetched content before including in prompts; instruct the model to ignore embedded instructions
  flags: [DOTALL]
- category: security
  id: prompt-injection-file-to-prompt
  message: File content loaded into LLM prompt — indirect prompt injection if file is user-uploaded or untrusted
  pattern: (?i)(?:\.read\s*\(\)|\.read_text\s*\(\)|readFile|readFileSync)\s*[\s\S]{0,200}(?:prompt|messages|system_message|instruction)\s*(?:=|\+=|\.append|\.push)
  severity: warning
  suggestion: Validate file content and strip potential injection payloads before including in prompts
  flags: [DOTALL]
- category: security
  id: prompt-injection-db-to-prompt
  message: Database query result used in LLM prompt — indirect injection if DB contains user-generated content
  pattern: (?i)(?:\.fetchone|\.fetchall|\.find\(|\.findOne|\.query\s*\()\s*[\s\S]{0,200}(?:prompt|messages|system_message|instruction)\s*(?:=|\+=|\.append|\.push)
  severity: warning
  suggestion: Treat database content as untrusted when building prompts; sanitize before inclusion
  flags: [DOTALL]
# ── LLM Safety & Configuration ──────────────────────────────────────
- category: security
  id: llm-safety-disabled-google
  message: Google AI safety settings set to BLOCK_NONE — all safety filters disabled
  pattern: (?:(?:threshold|safety|harm|block)\s*[=:]\s*.*BLOCK_NONE|HarmBlockThreshold\s*\.\s*BLOCK_NONE|['\"]BLOCK_NONE['\"])
  severity: critical
  suggestion: Use BLOCK_MEDIUM_AND_ABOVE or stricter; never disable safety filters in production
- category: security
  id: llm-safety-disabled-cohere
  message: Cohere safety_mode set to NONE — content filtering disabled
  pattern: (?i)safety_mode\s*=\s*['\"](?:NONE|none)['\"]
  severity: critical
  suggestion: Use CONTEXTUAL or STRICT safety mode in production
- category: security
  id: llm-safety-disabled-mistral
  message: Mistral safe_prompt disabled — safety guardrails removed
  pattern: (?i)safe_prompt\s*=\s*False
  severity: critical
  suggestion: Keep safe_prompt=True to enable Mistral's safety guardrails
- category: security
  id: llm-temperature-max
  message: LLM temperature set very high — increases unpredictability and jailbreak susceptibility
  pattern: temperature\s*[=:]\s*(?:2\.0|2(?:\.0*)?|1\.[5-9]\d*)\s*(?:[,}\)\]\s;]|$)
  severity: warning
  suggestion: Use temperature <= 1.0 for most applications; high temperature increases attack surface
  # llm-no-max-tokens removed — regex fundamentally cannot handle nested parens in real API calls.
  # This check requires AST/semantic analysis, not regex. See Takumi review fold-48.
# ── Conversation History / Multi-turn Injection ──────────────────────
- category: security
  id: llm-client-controlled-messages
  message: Client-supplied message array passed directly to LLM — attacker can inject fake system/assistant messages
  pattern: (?i)(?:request\.json|req\.body|request\.get_json)\s*(?:\[|\.get\s*\()\s*['\"]messages['\"]
  severity: critical
  suggestion: Never pass raw client message arrays to LLM; construct messages server-side with validated roles
- category: security
  id: llm-role-from-user-input
  message: Message role field from user input — allows injection of fake system/assistant messages
  pattern: (?i)['\"]role['\"]\s*:\s*(?:request\.|req\.|params\.|body\.|input\.|data\[|user_|msg\[)
  severity: critical
  suggestion: Always set message roles server-side; only allow 'user' role from client input
# ── Secrets in Prompts ───────────────────────────────────────────────
- category: security
  id: llm-secret-in-prompt
  message: API key or secret variable interpolated into LLM prompt — will be sent to LLM provider
  pattern: (?i)(?:prompt|system_prompt|system_message|instructions)\s*=\s*f['\"].*\{(?:api_key|secret|password|token|credential|db_|database_|conn)
  severity: critical
  suggestion: Never embed secrets in prompts; use tool calling to access backends securely
- category: security
  id: llm-connection-string-in-prompt
  message: Database connection string or URL in prompt template — credential exposure to LLM provider
  pattern: (?i)(?:prompt|system|instruction|message)\s*=\s*['\"].*(?:postgres(?:ql)?|mysql|mongodb|redis)://
  severity: critical
  suggestion: Never embed connection strings in prompts; use tool calling for database access
# ── Tool/Function Call Output Handling ─────────────────────────────
- category: security
  id: llm-tool-call-to-exec
  message: LLM tool call arguments passed to dangerous sink — code execution via tool calling
  pattern: (?:tool_calls|function\.arguments|tool_result|function_call)[\s\S]{0,300}(?:exec|eval|system|popen|subprocess|Runtime\.exec|ProcessBuilder|os\.Command)
  severity: critical
  suggestion: Validate and sanitize all LLM-generated tool call arguments before execution; never pass directly to shell or eval
  flags: [DOTALL]
- category: security
  id: llm-tool-call-to-sql
  message: LLM tool call arguments used in SQL query — SQL injection via tool calling
  pattern: (?:tool_calls|function\.arguments|tool_result|function_call)[\s\S]{0,300}(?:\.execute|\.query|\.raw|cursor\.)
  severity: critical
  suggestion: Parameterize SQL queries; never pass LLM-generated tool arguments directly to database queries
  flags: [DOTALL]
# ── Supply Chain (OWASP LLM03) ────────────────────────────────────
- category: security
  id: llm-untrusted-model-load
  message: Model loaded from user-controlled path — supply chain attack via malicious model
  pattern: (?i)(?:from_pretrained|load_model|AutoModel|AutoTokenizer|pipeline)\s*\(\s*(?:request|req|params|body|input|user|args|sys\.argv)
  severity: critical
  suggestion: Only load models from trusted, pinned sources; never allow user input to control model paths
- category: security
  id: llm-model-download-url
  message: Model downloaded from dynamic URL — supply chain risk
  pattern: (?i)(?:from_pretrained|load_model|download_model)\s*\(\s*f['"]|(?:from_pretrained|load_model)\s*\(\s*['"][^'"]*['"]\.format
  severity: warning
  suggestion: Pin model URLs to trusted registries; avoid dynamic model source resolution
# ── Excessive Agency (OWASP LLM06) ────────────────────────────────
- category: security
  id: llm-auto-approve-tools
  message: LLM tool execution with auto-approval — no human oversight for potentially destructive actions
  pattern: (?i)(?:auto_approve|auto_execute|skip_confirmation)\s*[=:]\s*(?:True|true|1)
  severity: warning
  suggestion: Require human confirmation for destructive tool actions; implement approval gates
- category: security
  id: llm-agent-unrestricted-tools
  message: Agent created with all tools or unrestricted tool access
  pattern: (?i)(?:tools\s*=\s*(?:get_all_tools|list_tools|ALL_TOOLS|\[.*\.\.\.\s*\])|allow_all_tools\s*=\s*True)
  severity: warning
  suggestion: Restrict agent tool access to minimum required set; apply principle of least privilege
# ── System Prompt Leakage (OWASP LLM07) ──────────────────────────
- category: security
  id: llm-system-prompt-logged
  message: System prompt written to logs — information leakage risk
  pattern: (?i)(?:log(?:ger)?|print|console)\s*\.(?:info|debug|warning|error|log)\s*\(.*(?:system_prompt|system_message|instructions)
  severity: warning
  suggestion: Never log system prompts; they may contain security-critical instructions
- category: security
  id: llm-system-prompt-returned
  message: System prompt included in API response — information leakage to client
  pattern: (?i)(?:return|jsonify|json\.dumps|res\.json|response)\s*\(.*(?:system_prompt|system_message|instructions)
  severity: warning
  suggestion: Never return system prompts to clients; keep system instructions server-side only
# ── Dangerous LLM Executors ──────────────────────────────────────────
- category: security
  id: llm-langchain-python-repl
  message: LangChain PythonREPL executes arbitrary code — critical if fed LLM output
  pattern: (?:PythonREPL|PythonREPLTool)\s*\(\s*\)
  severity: critical
  suggestion: Never use PythonREPL in production; sandbox code execution or use validated operations
- category: security
  id: llm-langchain-bash
  message: LangChain BashProcess executes shell commands — critical if fed LLM output
  pattern: (?:BashProcess|ShellTool|Terminal)\s*\(\s*\)
  severity: critical
  suggestion: Never expose shell execution to LLM agents; use specific, validated tool functions
- category: security
  id: llm-agent-unbounded-loop
  message: LLM agent in unbounded loop — runaway cost and potential infinite execution
  pattern: (?:while\s*\(\s*(?:true|True|1)\s*\)|while\s+(?:True|true|1)\s*:?)[\s\S]{0,1000}(?:chat\.completions\.create|messages\.create|completion|generate|\.invoke|\.run|\.predict)
  severity: warning
  suggestion: Set iteration limits and cost guards on LLM agent loops
  flags: [DOTALL]
# ── Prompt Namespace Leakage ─────────────────────────────────────────
- category: security
  id: prompt-injection-format-locals
  message: Prompt formatted with locals()/vars() — entire namespace leaks into prompt including secrets
  pattern: (?i)(?:prompt|system|instruction|message).*\.format\s*\(\s*\*\*(?:locals|vars|globals)\s*\(\s*\)\s*\)
  severity: critical
  suggestion: Explicitly pass only intended variables to .format(); never use locals()/vars()/globals()
- category: security
  id: prompt-injection-format-map-locals
  message: Prompt built with format_map(locals()/vars()) — namespace leakage risk
  pattern: (?i)(?:prompt|system|instruction|message).*\.format_map\s*\(\s*(?:locals|vars)\s*\(\s*\)\s*\)
  severity: critical
  suggestion: Explicitly pass only intended variables; never use format_map(locals())
# ── Additional LLM SDK Coverage ───────────────────────────────────
- category: security
  id: prompt-injection-ollama
  message: Ollama API call with interpolated content — prompt injection risk
  pattern: (?i)ollama\.(?:chat|generate)\s*\([\s\S]{0,200}(?:f['"]|['"][^'"]*['"]\.format|\+\s*\w|`[^`]*\$\{)
  severity: critical
  suggestion: Sanitize user input before passing to Ollama; use structured messages
  flags: [DOTALL]
- category: security
  id: prompt-injection-bedrock
  message: AWS Bedrock invoke_model with interpolated content — prompt injection risk
  pattern: (?i)(?:invoke_model|invoke_model_with_response_stream)\s*\([\s\S]{0,200}(?:f['"]|['"][^'"]*['"]\.format|\+\s*\w)
  severity: critical
  suggestion: Validate and sanitize all user input before sending to Bedrock models
  flags: [DOTALL]
- category: security
  id: prompt-injection-groq
  message: Groq API call with interpolated content — prompt injection risk
  pattern: (?i)groq\.(?:chat\.completions\.create|completions\.create)\s*\([\s\S]{0,200}(?:f['"]|['"][^'"]*['"]\.format|\+\s*\w)
  severity: critical
  suggestion: Sanitize user input before passing to Groq API
  flags: [DOTALL]
# ── Multimodal Injection (OWASP emerging) ─────────────────────────
- category: security
  id: llm-untrusted-image-to-vision
  message: User-uploaded or untrusted image passed to vision model — image-based prompt injection risk
  pattern: (?i)(?:image_url|image_data|image_content|image_path)\s*[=:]\s*(?:request|req|params|body|input|user|upload|args)
  severity: warning
  suggestion: Validate and filter image content before passing to vision models; do not trust embedded text in images
- category: security
  id: llm-base64-image-from-input
  message: Base64 image from user input sent to LLM — potential image-based injection
  pattern: (?i)base64[._](?:encode|b64encode|encodebytes)\s*\([\s\S]{0,200}(?:request|req\.|upload|user_|input)
  severity: warning
  suggestion: Validate image content and source before base64 encoding for LLM consumption
  flags: [DOTALL]
# ── Sensitive Info in Responses (OWASP LLM02) ─────────────────────
- category: security
  id: llm-response-no-pii-filter
  message: LLM response returned to user without PII/sensitive data filtering
  pattern: (?i)(?:return|send|res\.json|jsonify|response\.write)\s*\(\s*(?:response|completion|result|output|answer|reply)\.(?:text|content|choices)
  severity: info
  suggestion: Filter LLM responses for PII, credentials, and sensitive data before returning to users
- category: security
  id: llm-training-data-leak-check
  message: LLM output used without checking for training data memorization markers
  pattern: (?i)(?:response|completion|output)\.(?:text|content|choices)[\s\S]{0,50}(?:return|send|print|write|render)(?![\s\S]{0,200}(?:filter|sanitize|redact|mask|scrub))
  severity: info
  suggestion: Implement output filtering to detect and redact potential training data leakage
  flags: [DOTALL]
# ── Data and Model Poisoning (OWASP LLM04) ───────────────────────
- category: security
  id: llm-untrusted-training-data
  message: Training data loaded from user-controlled or untrusted source — data poisoning risk
  pattern: (?i)(?:load_dataset|read_csv|read_json|from_pandas|from_csv)\s*\(\s*(?:request|req|params|body|input|user|upload|args|sys\.argv)
  severity: critical
  suggestion: Validate and sanitize all training data sources; use curated datasets only
- category: security
  id: llm-fine-tune-untrusted
  message: Fine-tuning with user-uploaded data without validation — model poisoning risk
  pattern: (?i)(?:fine_tune|finetune|train|Trainer|SFTTrainer|TrainingArguments)\s*\([\s\S]{0,300}(?:request|req\.|upload|user_|input_|body\.)
  severity: critical
  suggestion: Validate, filter, and review all fine-tuning data; implement data quality checks
  flags: [DOTALL]
- category: security
  id: llm-pickle-model-load
  message: Model loaded via pickle/joblib — arbitrary code execution on deserialization
  pattern: (?i)(?:pickle\.load|joblib\.load|torch\.load)\s*\(\s*(?:request|req|params|upload|user|input|args)
  severity: critical
  suggestion: Use safetensors or verified model formats; never load pickled models from untrusted sources
# ── Unbounded Consumption (OWASP LLM10) ──────────────────────────
- category: security
  id: llm-no-rate-limit
  message: LLM endpoint without rate limiting — resource exhaustion and cost overrun risk
  pattern: (?i)(?:@app\.(?:route|post|get)|@router\.(?:post|get)|app\.(?:post|get))\s*\([\s\S]{0,500}(?:chat\.completions\.create|messages\.create|generate_content|completion|\.invoke)(?![\s\S]{0,300}(?:rate_limit|ratelimit|throttle|RateLimiter|slowapi|limiter))
  severity: warning
  suggestion: Apply rate limiting to all LLM-powered endpoints to prevent abuse and cost overruns
  flags: [DOTALL]
- category: security
  id: llm-no-token-budget
  message: LLM call without token budget or cost tracking — unbounded spending risk
  pattern: (?i)(?:chat\.completions\.create|messages\.create|generate_content)\s*\([^)]*\)[\s\S]{0,200}(?![\s\S]{0,200}(?:max_tokens|token_budget|cost_limit|usage\.total_tokens))
  severity: info
  suggestion: Track token usage and set budgets to prevent unexpected cost overruns
  flags: [DOTALL]
- category: security
  id: llm-streaming-no-timeout
  message: LLM streaming response without timeout — potential hanging connection
  pattern: (?i)(?:stream\s*=\s*True|stream:\s*true)[\s\S]{0,300}(?![\s\S]{0,200}(?:timeout|signal|AbortController|asyncio\.wait_for))
  severity: info
  suggestion: Set timeouts on streaming LLM calls to prevent indefinite resource consumption
  flags: [DOTALL]
# ── RAG-Specific Injection (OWASP LLM01 — RAG Poisoning) ────────────
- category: security
  id: rag-document-to-prompt
  message: Retrieved document/chunk content interpolated directly into LLM prompt without sanitization — RAG injection risk
  pattern: (?i)(?:similarity_search|vector_search|\.query|\.retrieve|get_relevant_documents|\.search|as_retriever)\s*\([\s\S]{0,300}(?:prompt|system_prompt|system_message|messages|instruction|content)\s*(?:=|\+=|\.append|\.format|\.join|f['"])
  severity: critical
  suggestion: Sanitize retrieved document content before including in prompts; strip potential injection payloads from chunks
  flags: [DOTALL]
- category: security
  id: rag-metadata-injection
  message: Vector DB metadata from retrieval result used in prompt — metadata injection risk if source is user-controlled
  pattern: (?i)(?:\.metadata|\.page_content|doc\.metadata|chunk\.metadata|result\.metadata)\s*\[[\s\S]{0,200}(?:prompt|system_prompt|system_message|messages|instruction|content)\s*(?:=|\+=|\.append|\.format|f['"])
  severity: warning
  suggestion: Treat retrieval metadata as untrusted; validate and sanitize metadata fields before prompt inclusion
  flags: [DOTALL]
- category: security
  id: rag-no-chunk-sanitization
  message: Document chunks concatenated/joined directly into prompt string without content filtering
  pattern: (?i)(?:join|\\n\.join|"\s*\\n\s*"\.join|concat)\s*\(\s*(?:chunks|documents|docs|results|passages|contexts|retrieved|search_results)[\s\S]{0,200}(?:prompt|system_prompt|system_message|messages|instruction|content)\s*(?:=|\+=|\.append|\.format|f['"])
  severity: warning
  suggestion: Filter and sanitize each chunk before concatenation; remove potential prompt injection patterns from retrieved content
  flags: [DOTALL]
- category: security
  id: rag-user-query-in-system-prompt
  message: User search query placed in system prompt — should be in user message to maintain role separation
  pattern: (?i)['\"]role['\"]\s*:\s*['\"]system['\"][\s\S]{0,200}(?:query|question|user_input|user_query|search_query|user_message|user_request)
  severity: critical
  suggestion: Place user queries in the user role message, not in system prompts; system prompts should contain only developer-controlled instructions
  flags: [DOTALL]
- category: security
  id: rag-unbounded-context
  message: All retrieval results added to prompt without length or count limits — unbounded context window consumption
  pattern: (?i)for\s+\w+\s+in\s+(?:results|documents|docs|chunks|passages|search_results|retrieved)\s*:[\s\S]{0,200}(?:prompt|context|messages)\s*(?:\+=|\.append|\.extend)(?![\s\S]{0,100}(?:\[:|\[0:|limit|max_|slice|truncat))
  severity: warning
  suggestion: Limit the number and total length of retrieved chunks added to prompt; use top-k with a reasonable bound
  flags: [DOTALL]
- category: security
  id: rag-source-trust-boundary
  message: User-uploaded or external file content passed directly to embedding/indexing without sanitization
  pattern: (?i)(?:add_documents|add_texts|from_documents|index\.upsert|index\.add|\.add_embeddings|collection\.add|\.insert)\s*\([\s\S]{0,200}(?:request|req\.|upload|user_|input_|body\.|file\.|uploaded)
  severity: critical
  suggestion: Sanitize and validate user-uploaded document content before indexing into vector store; strip injection payloads
  flags: [DOTALL]
# ── Structured Output Manipulation (OWASP LLM01/LLM02) ───────────
- category: security
  id: llm-json-output-to-eval
  message: LLM JSON response parsed then passed to eval/exec — code execution via structured output
  pattern: (?i)(?:json\.loads|\.json\(\)|\bjson\.parse)\s*\([\s\S]{0,200}(?:response|completion|chat|llm|openai|anthropic|message|result)[\s\S]{0,300}(?:eval|exec)\s*\(
  severity: critical
  suggestion: Never pass parsed LLM JSON output to eval/exec; validate fields against an allowlist and use safe dispatch
  flags: [DOTALL]
- category: security
  id: llm-json-output-to-sql
  message: LLM structured output used in SQL query construction — SQL injection via structured output
  pattern: (?i)(?:json\.loads|\.json\(\)|\bjson\.parse)\s*\([\s\S]{0,200}(?:response|completion|chat|llm|openai|anthropic|message|result)[\s\S]{0,300}(?:\.execute|\.query|\.raw|cursor\.|SELECT\s|INSERT\s|UPDATE\s|DELETE\s)
  severity: critical
  suggestion: Use parameterized queries; never interpolate LLM-generated JSON fields into SQL strings
  flags: [DOTALL]
- category: security
  id: llm-json-output-to-shell
  message: LLM structured output used in shell command — command injection via structured output
  pattern: (?i)(?:json\.loads|\.json\(\)|\bjson\.parse)\s*\([\s\S]{0,200}(?:response|completion|chat|llm|openai|anthropic|message|result)[\s\S]{0,300}(?:subprocess|os\.system|os\.popen|child_process|exec\(|execSync|Runtime\.exec|ProcessBuilder)
  severity: critical
  suggestion: Never pass LLM-generated JSON fields to shell commands; use allowlisted operations with strict argument validation
  flags: [DOTALL]
- category: security
  id: llm-json-output-to-url
  message: LLM structured output used to construct URL for HTTP request — SSRF risk via structured output
  pattern: (?i)(?:json\.loads|\.json\(\)|\bjson\.parse)\s*\([\s\S]{0,200}(?:response|completion|chat|llm|openai|anthropic|message|result)[\s\S]{0,300}(?:requests\.get|requests\.post|fetch\(|urllib|http\.get|axios|httpx|aiohttp)
  severity: warning
  suggestion: Validate and allowlist URLs from LLM output before making HTTP requests; block internal/private IP ranges
  flags: [DOTALL]
- category: security
  id: llm-json-output-to-template
  message: LLM structured output injected into server-side template — SSTI risk via structured output
  pattern: (?i)(?:json\.loads|\.json\(\)|\bjson\.parse)\s*\([\s\S]{0,200}(?:response|completion|chat|llm|openai|anthropic|message|result)[\s\S]{0,300}(?:render_template_string|Template\(|render_string|Jinja2|\.render\(|template\.render|nunjucks|Handlebars\.compile|ejs\.render)
  severity: warning
  suggestion: Never pass LLM output directly into template rendering; use pre-defined templates with auto-escaping
  flags: [DOTALL]
- category: security
  id: llm-function-call-no-validation
  message: LLM function call name used to invoke function without allowlist validation — arbitrary function execution
  pattern: (?i)(?:function_call|function_name|tool_calls|tool_name|\.name)\s*[\[=][\s\S]{0,200}(?:getattr|globals\s*\(\s*\)\s*\[|locals\s*\(\s*\)\s*\[|eval\s*\(|__import__)
  severity: warning
  suggestion: Validate function names against an explicit allowlist before dispatch; never use getattr/globals/eval with LLM-provided names
  flags: [DOTALL]
- category: security
  id: llm-structured-output-trusted
  message: LLM response content used directly without validation or sanitization
  pattern: (?i)(?:response|completion|chat_result)\.(?:choices\[|content|message|text|output)[\s\S]{0,100}(?:return\s|res\.json|jsonify|send\(|response\.write|print\()(?![\s\S]{0,200}(?:sanitize|validate|filter|escape|clean|strip|check|verify|allow))
  severity: info
  suggestion: Validate and sanitize LLM response content before using in application logic or returning to users
  flags: [DOTALL]
# ── Encoding-Based Prompt Injection (OWASP LLM01 — Encoding Bypass) ──
- category: security
  id: llm-base64-decode-to-prompt
  message: Base64-decoded content injected into LLM prompt — attacker can hide malicious instructions in encoded payloads
  pattern: (?i)(?:(?:b64decode|atob|base64\.decode|base64\.b64decode|decodebytes)\s*\(|Buffer\.from\s*\([^)]*,\s*['"]base64['"]\s*\))[\s\S]{0,400}(?:prompt|system_prompt|system_message|messages|instruction|content|completion)\s*(?:=|\+=|\.append|\.format|f['"])
  severity: critical
  suggestion: Never decode base64 content directly into LLM prompts; validate and sanitize decoded content against an allowlist
  flags: [DOTALL]
- category: security
  id: llm-rot13-decode-to-prompt
  message: ROT13-decoded content used in LLM prompt — simple encoding trick to bypass safety filters
  pattern: (?i)(?:codecs\.decode\s*\([^)]*['"]rot.?13['"]|rot13|\.translate\s*\([^)]*maketrans)[\s\S]{0,400}(?:prompt|system_prompt|system_message|messages|instruction|content|completion)\s*(?:=|\+=|\.append|\.format|f['"])
  severity: warning
  suggestion: Do not use ROT13 or other trivial ciphers to construct prompts; use plain text with proper input validation
  flags: [DOTALL]
- category: security
  id: llm-unicode-escape-in-prompt
  message: Unicode escape sequences in prompt string — can hide malicious instructions from human review
  pattern: (?i)(?:prompt|system_prompt|system_message|instruction)\s*=\s*(?:.*\\u[0-9a-f]{4}|.*\\x[0-9a-f]{2}|.*unicode_escape)
  severity: warning
  suggestion: Avoid unicode escape sequences in prompts; use readable plain text and validate all prompt content
- category: security
  id: llm-encoded-instruction-decode
  message: Decoded or decompressed content fed into LLM prompt — encoding can obscure malicious instructions
  pattern: (?i)(?:zlib\.decompress|gzip\.decompress|bz2\.decompress|lzma\.decompress|\.decode\s*\(\s*['"](?:utf-8|ascii|latin|cp1252|unicode_escape)['"]|unhexlify|binascii\.unhexlify)\s*\([\s\S]{0,400}(?:prompt|system_prompt|system_message|messages|instruction|content|completion)\s*(?:=|\+=|\.append|\.format|f['"])
  severity: warning
  suggestion: Validate and sanitize all decoded or decompressed content before including in LLM prompts
  flags: [DOTALL]
- category: security
  id: llm-prompt-from-hex
  message: Hex-decoded payload injected into LLM prompt — hex encoding can hide malicious instructions
  pattern: (?i)(?:(?:bytes\.fromhex|bytearray\.fromhex|unhexlify|hex_decode)\s*\(|Buffer\.from\s*\([^)]*,\s*['"]hex['"]\s*\))[\s\S]{0,400}(?:prompt|system_prompt|system_message|messages|instruction|content|completion)\s*(?:=|\+=|\.append|\.format|f['"])
  severity: warning
  suggestion: Never inject hex-decoded content into LLM prompts; decode and validate against expected format first
  flags: [DOTALL]
- category: security
  id: llm-multiline-ascii-art-in-prompt
  message: Large multi-line string in prompt — ASCII art injection can embed hidden instructions in visual patterns
  pattern: (?i)(?:prompt|system_prompt|system_message|instruction)\s*=\s*(?:"""[\s\S]*?\n[\s\S]*?\n[\s\S]*?\n[\s\S]*?\n[\s\S]*?\n[\s\S]*?\n[\s\S]*?\n[\s\S]*?\n[\s\S]*?\n[\s\S]*?"""|`[^`]*\n[^`]*\n[^`]*\n[^`]*\n[^`]*\n[^`]*\n[^`]*\n[^`]*\n[^`]*\n[^`]*`)
  severity: info
  suggestion: Review large multi-line prompt strings for hidden ASCII art instructions; prefer programmatic prompt construction
  flags: [DOTALL]
- category: security
  id: llm-prompt-char-substitution
  message: Prompt built from character codes (chr/fromCharCode) — can hide instructions from static analysis and human review
  pattern: (?i)(?:chr\s*\(\s*\d+\s*\)|String\.fromCharCode\s*\()[\s\S]{0,300}(?:prompt|system_prompt|system_message|messages|instruction|content|completion)\s*(?:=|\+=|\.append|\.join)
  severity: info
  suggestion: Do not construct prompts from character codes; use plain text strings that can be reviewed
  flags: [DOTALL]
# ── AI Agent Framework Security (CrewAI, AutoGen, DSPy, LangGraph, Claude SDK) ─
- category: security
  id: crewai-agent-allow-code-execution
  message: CrewAI Agent with allow_code_execution=True — enables arbitrary code execution by the agent
  pattern: (?i)Agent\s*\([\s\S]{0,500}allow_code_execution\s*=\s*True
  severity: critical
  suggestion: Disable allow_code_execution or sandbox code execution; agents should not run arbitrary code
  flags: [DOTALL]
- category: security
  id: crewai-task-user-input-in-description
  message: CrewAI Task description built with user input interpolation — prompt injection risk
  pattern: (?i)Task\s*\([\s\S]{0,300}description\s*=\s*(?:f['"]|['"][^'"]*['"]\.format\s*\(|['"][^'"]*['"]\s*\+\s*(?:request|req|user|input|params|body))
  severity: warning
  suggestion: Sanitize user input before interpolating into Task descriptions; use validated templates
  flags: [DOTALL]
- category: security
  id: crewai-agent-delegation-unrestricted
  message: CrewAI agent with allow_delegation=True — unrestricted delegation to other agents
  pattern: (?i)Agent\s*\([\s\S]{0,500}allow_delegation\s*=\s*True
  severity: warning
  suggestion: Restrict delegation scope or disable delegation; implement delegation constraints and approval gates
  flags: [DOTALL]
- category: security
  id: autogen-code-executor-unsafe
  message: AutoGen code executor without sandboxing — enables arbitrary code execution
  pattern: (?i)(?:LocalCommandLineCodeExecutor|DockerCommandLineCodeExecutor)\s*\(
  severity: critical
  suggestion: Use sandboxed code execution with strict resource limits; prefer DockerCommandLineCodeExecutor with restricted images
- category: security
  id: autogen-user-proxy-auto-reply
  message: AutoGen UserProxyAgent with human_input_mode=NEVER — fully autonomous with no human oversight
  pattern: (?i)UserProxyAgent\s*\([\s\S]{0,500}human_input_mode\s*=\s*['\"]NEVER['\"]
  severity: warning
  suggestion: Use human_input_mode=ALWAYS or TERMINATE for safety-critical workflows; add human oversight checkpoints
  flags: [DOTALL]
- category: security
  id: autogen-register-function-unvalidated
  message: AutoGen register_function with no input validation on the registered callable
  pattern: (?i)register_function\s*\(\s*\w+\s*,[\s\S]{0,300}(?:caller|executor)\s*=
  severity: warning
  suggestion: Validate and sanitize all inputs in registered functions; add type checking and bounds validation
  flags: [DOTALL]
- category: security
  id: dspy-assert-bypass
  message: DSPy assertion/suggestion bypass enabled — safety assertions will be silently ignored
  pattern: (?i)(?:dspy\.settings\.configure|dspy\.configure)\s*\([\s\S]{0,300}bypass_assert\s*=\s*True
  severity: warning
  suggestion: Do not bypass assertions in production; assertions enforce output quality and safety constraints
  flags: [DOTALL]
- category: security
  id: dspy-tool-user-input-unsanitized
  message: DSPy tool receiving user input without sanitization — injection risk
  pattern: (?i)(?:dspy\.Tool|dspy\.ReAct|dspy\.Predict)\s*\([\s\S]{0,300}(?:request\.|req\.|user_input|body\.|params\.)
  severity: warning
  suggestion: Sanitize and validate all user input before passing to DSPy tools or modules
  flags: [DOTALL]
- category: security
  id: langgraph-tool-node-unrestricted
  message: LangGraph ToolNode with unrestricted tool access — no permission boundaries on agent tool use
  pattern: (?i)ToolNode\s*\(\s*(?:tools|all_tools|\[[\s\S]{0,500}\])
  severity: critical
  suggestion: Restrict ToolNode to minimum required tools; implement permission boundaries and tool-level access control
  flags: [DOTALL]
- category: security
  id: langgraph-human-in-loop-disabled
  message: LangGraph agent graph compiled without interrupt checkpoints — no human-in-the-loop oversight
  pattern: (?i)(?:StateGraph|MessageGraph)\s*\([\s\S]{0,1000}\.compile\s*\(\s*(?:checkpointer\s*=\s*\w+\s*)?\)(?![\s\S]{0,100}interrupt)
  severity: warning
  suggestion: Add interrupt_before or interrupt_after to critical nodes for human oversight; use checkpointer with interrupt points
  flags: [DOTALL]
- category: security
  id: claude-agent-sdk-unsafe-tool
  message: Claude Agent SDK tool that executes code or shell commands from agent output — RCE risk
  pattern: (?i)(?:claude_agent_sdk|claude_code_sdk|anthropic\.agent)[\s\S]{0,500}(?:exec\s*\(|eval\s*\(|subprocess|os\.system|os\.popen|child_process|execSync|shell_exec)
  severity: critical
  suggestion: Never execute agent-generated code without sandboxing; use validated operations with strict allowlists
  flags: [DOTALL]
- category: security
  id: claude-agent-sdk-no-guardrails
  message: Claude Agent SDK agent without guardrail functions — no safety validation on agent outputs
  pattern: (?i)(?:Agent|AgentRunner|create_agent)\s*\([\s\S]{0,500}(?:tools\s*=)(?![\s\S]{0,300}(?:guardrail|guard|validator|filter|safety))
  severity: warning
  suggestion: Configure guardrail functions to validate agent outputs before execution; implement safety boundaries
  flags: [DOTALL]
# ── LLM Output as Regex (ReDoS) ──────────────────────────────────
- category: security
  id: llm-output-to-regex-python
  message: LLM output used as regex pattern — ReDoS risk from unvalidated model response
  pattern: re\.compile\s*\(\s*(?:response|completion|result|output|generated|answer|reply|content|text)
  severity: warning
  suggestion: Never pass raw LLM output to re.compile; validate or sanitize regex patterns first
  cwe: CWE-1333
- category: security
  id: llm-output-to-regex-js
  message: LLM output used as regex pattern — ReDoS risk from unvalidated model response
  pattern: new\s+RegExp\s*\(\s*(?:response|completion|result|output|generated|answer|reply|content|text)
  severity: warning
  suggestion: Never pass raw LLM output to RegExp constructor; validate or sanitize regex patterns first
  cwe: CWE-1333
# ── Missing Stop Reason Check ────────────────────────────────────
- category: security
  id: llm-no-stop-reason-check-anthropic
  message: Anthropic messages.create() response used without checking stop_reason — may process incomplete or truncated output
  pattern: messages\.create\s*\([^)]*\)[\s\S]{0,500}(?!stop_reason)
  severity: info
  suggestion: Check response.stop_reason to ensure the model completed normally before using output
  flags: [DOTALL]
