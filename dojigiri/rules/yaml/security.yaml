rules:
- category: security
  id: path-traversal
  message: Possible path traversal attack with ../
  pattern: (?:open|read|write|include)\s*\([^)]*\.\./
  severity: critical
  suggestion: Validate and sanitize file paths
- category: security
  id: private-key
  message: Private key found in source code
  pattern: '-----BEGIN (?:RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----'
  severity: critical
  suggestion: Remove immediately and rotate the key
- category: security
  id: db-connection-string
  message: Database connection string with embedded credentials
  pattern: (?i)(?:postgres(?:ql)?|mysql|mongodb(?:\+srv)?|redis|amqp|jdbc:[a-z]+)://[^:]+:[^@]+@
  severity: critical
  suggestion: Use environment variables for connection strings
- category: security
  id: logging-sensitive-data
  message: Possibly logging sensitive data (password, secret, token)
  pattern: (?i)(?:log(?:ger)?\.(?:info|debug|warn|error|critical|warning)|print|console\.log|puts)\s*\(.*\b(?:password|passwd|secret_key|api_key|auth_token|credential)\b
  severity: warning
  suggestion: Redact sensitive values before logging
- category: security
  id: logging-config-listen
  message: logging.config.listen() accepts config over network — can load arbitrary handler classes (RCE)
  pattern: logging\.config\.listen\s*\(
  severity: critical
  suggestion: Avoid network-based logging config; use file-based or environment-based config instead
- category: security
  id: insecure-des
  message: DES encryption is broken — 56-bit keys are trivially brute-forced
  pattern: \bDES\b\.new\(|\bDES\.(?:encrypt|decrypt)\b|from\s+Crypto\.Cipher\s+import\s+DES\b
  severity: warning
  suggestion: Use AES-256 or ChaCha20 instead
- category: security
  id: insecure-ecb-mode
  message: ECB mode does not hide data patterns — insecure for most uses
  pattern: (?i)(?:MODE_ECB|mode\s*=\s*['"]?ECB|\.ECB\b)
  severity: warning
  suggestion: Use CBC, GCM, or CTR mode instead
- category: security
  id: insecure-blowfish
  message: Blowfish has 64-bit blocks — vulnerable to birthday attacks at scale
  pattern: \bBlowfish\b\.new\(|\bBlowfish\.(?:encrypt|decrypt)\b|from\s+Crypto\.Cipher\s+import\s+Blowfish\b
  severity: warning
  suggestion: Use AES-256 or ChaCha20 instead
- category: security
  id: insecure-rc4
  message: RC4/ARC4 is a broken stream cipher with known biases
  pattern: \bARC4\b\.new\(|\bARC4\.(?:encrypt|decrypt)\b|from\s+Crypto\.Cipher\s+import\s+ARC4\b|\bRC4\b
  severity: warning
  suggestion: Use AES-GCM or ChaCha20-Poly1305 instead
- category: security
  id: requests-no-timeout
  message: HTTP request without timeout — can hang indefinitely
  pattern: requests\.(?:get|post|put|delete|patch|head|request)\s*\([^)]*\)\s*(?!.*timeout)
  severity: warning
  suggestion: Always pass timeout= to requests calls
- category: security
  id: ssrf-risk
  message: HTTP request — verify URL is not constructed from user input (SSRF risk)
  pattern: (?:requests\.(?:get|post|put|delete|patch|head)\s*\(|urllib\.request\.urlopen\s*\(|http\.client\.HTTP\w*Connection\s*\(|fetch\s*\(\s*(?!['"]/)(?!url_for)|axios\.(?:get|post|put|delete)\s*\(|http\.Get\s*\(|http\.Post\s*\()(?!.*url_for\s*\()
  severity: warning
  suggestion: Validate URLs against an allowlist of domains/schemes before making requests
- category: security
  id: url-scheme-audit
  message: urlopen permits file:/ and custom schemes — verify URL scheme is restricted to https
  pattern: (?:urllib\.request\.urlopen\s*\(|urllib\.request\.urlretrieve\s*\(|urlopen\s*\()
  severity: warning
  suggestion: Validate URL scheme against allowlist (e.g., only https://) before opening
- category: security
  id: ssti-risk
  message: Template constructed from string — may allow server-side template injection
  pattern: (?<!def )(?:Template\s*\((?!\s*['"])|render_template_string\s*\((?!\s*['"])|from_string\s*\((?!\s*['"])|Environment\s*\(\s*\)\.from_string|Jinja2\s*\(.*\bstring\b|new\s+Function\s*\()
  severity: critical
  suggestion: Use pre-compiled templates from files, never from user-controlled strings
- category: security
  id: xxe-risk
  message: XML parsing — ensure external entities are disabled to prevent XXE attacks
  pattern: (?:xml\.etree\.ElementTree\.(?:parse|fromstring|iterparse)\s*\(|xml\.dom\.minidom\.(?:parse|parseString)\s*\(|xml\.sax\.(?:parse|parseString)\s*\(|lxml\.etree\.(?:parse|fromstring|iterparse)\s*\(|DocumentBuilderFactory|XMLReader|SAXParser|DOMParser\s*\(\)|ET\.(?:parse|fromstring|iterparse)\s*\(|etree\.(?:parse|fromstring|iterparse)\s*\(|minidom\.(?:parse|parseString)\s*\(|sax\.(?:parse|parseString)\s*\()
  severity: warning
  suggestion: Use defusedxml (Python), disable DTDs/external entities in parser config
- category: security
  id: jwt-insecure
  message: JWT decoded with insecure settings — disabled verification or 'none' algorithm
  pattern: (?:jwt\.decode\s*\([^)]*(?:algorithms\s*=\s*\[['"]none['"]\]|verify\s*=\s*False|options\s*=\s*\{[^}]*'verify_\w+'\s*:\s*False)|\.decode\s*\(\s*token[^)]*algorithm\s*=\s*['"](?:none|HS256)['"])
  severity: critical
  suggestion: Always verify JWT signatures with a strong algorithm (RS256/ES256) and validate claims
- category: security
  id: hardcoded-ip
  message: Hardcoded IP address — may break in different environments
  pattern: (?<!\d)(?!127\.0\.0\.1|0\.0\.0\.0|255\.255\.255\.255)(?:(?:25[0-5]|2[0-4]\d|1\d\d|[1-9]\d|\d)\.){3}(?:25[0-5]|2[0-4]\d|1\d\d|[1-9]\d|\d)(?!\d)
  severity: info
  suggestion: Use configuration files or environment variables for IP addresses
- category: security
  id: bind-all-interfaces
  message: Binding to 0.0.0.0 exposes the service to all network interfaces
  pattern: (?:\.bind|\.run|start_server|HTTPServer|TCPServer|UDPServer|SimpleXMLRPCServer|ThreadingTCPServer|ForkingTCPServer|BaseManager|SyncManager)\s*\([^)]*['"]0\.0\.0\.0['"]|=\s*['"]0\.0\.0\.0['"]
  severity: warning
  suggestion: Bind to specific interface (127.0.0.1 for local-only, or configure via env var)
- category: security
  id: toctou-file-check
  message: File existence check before use — potential TOCTOU race condition
  pattern: \bos\.path\.(?:exists|isfile|isdir)\s*\(\s*\w+\s*\)
  severity: info
  suggestion: Use try/except around the file operation instead of checking first
- category: security
  id: weak-hash-md5
  message: MD5 is cryptographically broken — do not use for security
  pattern: (?i)\bmd5\s*\(|\bhashlib\.md5\b|\bMD5\.(?:Create|new|digest)\b|\bDigestUtils\.md5\b|MessageDigest\.getInstance\s*\(\s*['"]MD5['"]
  severity: warning
  suggestion: Use SHA-256 or SHA-3 for integrity; use bcrypt/scrypt/argon2 for passwords
- category: security
  id: weak-hash-sha1
  message: SHA1 is cryptographically weak — collision attacks demonstrated
  pattern: (?i)\bsha1\s*\(|\bhashlib\.sha1\b|\bSHA1\.(?:Create|new|digest)\b|\bDigestUtils\.sha1\b|MessageDigest\.getInstance\s*\(\s*['"]SHA-?1['"]
  severity: warning
  suggestion: Use SHA-256 or SHA-3 instead
- category: security
  id: cors-wildcard
  message: 'CORS allows all origins — any website can make authenticated requests'
  pattern: (?i)(?:Access-Control-Allow-Origin['"]\s*[:,]\s*['"]\*|cors\s*\(\s*\)|allow_origins\s*=\s*\[['"]?\*)
  severity: warning
  suggestion: Restrict CORS to specific trusted origins
- category: security
  id: open-redirect
  message: Redirect to user-controlled URL — open redirect risk
  pattern: (?i)(?:redirect|location\.href|window\.location|res\.redirect)\s*(?:=|\()\s*(?:req\.|request\.|params\.|query\.)
  severity: warning
  suggestion: Validate redirect targets against an allowlist of trusted paths/domains
- category: security
  id: xss-innerhtml
  message: innerHTML assignment — XSS risk if value contains user input
  pattern: \.innerHTML\s*=\s*(?!['"]<)
  severity: warning
  suggestion: Use textContent for text, or sanitize HTML with DOMPurify
- category: security
  id: xss-document-write
  message: document.write() — XSS risk and blocks page rendering
  pattern: \bdocument\.write\s*\(
  severity: warning
  suggestion: Use DOM manipulation methods (createElement, textContent) instead
- category: security
  id: deserialization-unsafe
  message: Unsafe deserialization — can lead to remote code execution
  pattern: (?i)(?:pickle\.loads?\s*\(|yaml\.load\s*\([^)]*(?!Loader)|marshal\.loads?\s*\(|ObjectInputStream|unserialize\s*\(|readObject\s*\()
  severity: critical
  suggestion: Use safe deserialization (yaml.safe_load, JSON) or validate input
- category: security
  id: debug-enabled
  message: Debug mode enabled — may expose sensitive information in production
  pattern: (?i)(?:DEBUG\s*=\s*True|debug\s*:\s*true|\.debug\s*=\s*true|app\.run\s*\([^)]*debug\s*=\s*True)
  severity: warning
  suggestion: Disable debug mode in production environments
- category: security
  id: weak-tls-version
  message: Weak TLS version (< 1.2) — vulnerable to known attacks
  pattern: (?i)(?:SSLv[23]|TLSv1(?:\.0)?|TLS_1_0|TLS_1_1|PROTOCOL_TLSv1(?:_1)?)\b
  severity: warning
  suggestion: Use TLS 1.2 or 1.3 minimum
- category: security
  id: csrf-disabled
  message: CSRF protection disabled — cross-site request forgery risk
  pattern: (?i)(?:csrf_exempt|@csrf_exempt|WTF_CSRF_ENABLED\s*=\s*False|csrf\s*:\s*false|CSRF_COOKIE_SECURE\s*=\s*False)
  severity: warning
  suggestion: Enable CSRF protection for state-changing endpoints
- category: security
  id: session-insecure
  message: Session cookie without secure flags — may be intercepted
  pattern: (?i)(?:SESSION_COOKIE_SECURE\s*=\s*False|cookie_secure\s*=\s*false|secure\s*:\s*false|httponly\s*:\s*false)
  severity: warning
  suggestion: Set Secure, HttpOnly, and SameSite flags on session cookies
- category: security
  id: password-in-url
  message: Password in URL — visible in logs, referrer headers, browser history
  pattern: (?i)(?:https?://[^:]+:[^@]+@(?!localhost))
  severity: critical
  suggestion: Use authentication headers instead of embedding credentials in URLs
- category: security
  id: insecure-ssl-context
  message: SSL context with no verification — MITM risk
  pattern: (?i)(?:ssl\.create_default_context\s*\([^)]*\)\s*\n\s*.*check_hostname\s*=\s*False|ssl\._create_unverified_context|CERT_NONE|verify_mode\s*=\s*ssl\.CERT_NONE)
  severity: critical
  suggestion: Enable certificate verification; configure proper CA certificates
- category: security
  id: directory-listing
  message: Directory listing or autoindex enabled — may expose sensitive files
  pattern: (?i)(?:autoindex\s+on|Options\s+\+?Indexes|directory_listing\s*[:=]\s*(?:true|on|enabled))
  severity: warning
  suggestion: Disable directory listing in web server configuration
- category: security
  id: file-upload-unrestricted
  message: File upload — verify file type, size, and name are validated
  pattern: (?i)(?:request\.files|uploaded_file|multipart|file_field|FileField|multer|formidable|busboy)
  severity: info
  suggestion: Validate file type (allowlist), enforce size limits, sanitize filenames
- category: security
  id: race-condition-mkdir
  message: mkdir without exist_ok — race condition between check and creation
  pattern: \bos\.makedirs?\s*\([^)]*\)\s*(?!.*exist_ok)
  severity: info
  suggestion: Use os.makedirs(path, exist_ok=True) to handle concurrent creation
- category: security
  id: mass-assignment
  message: Mass assignment — all request parameters passed to model/object
  pattern: (?i)(?:\.create\s*\(\s*\*\*request\.|\.update\s*\(\s*\*\*request\.|Object\.assign\s*\(\s*\w+\s*,\s*req\.body|\.set\s*\(\s*req\.body\))
  severity: warning
  suggestion: Explicitly list allowed parameters instead of passing all request data
- category: security
  id: header-injection
  message: HTTP header set from user input — header injection risk
  pattern: (?i)(?:set_header|add_header|response\.headers|setHeader)\s*\([^)]*(?:request\.|req\.|params\.|query\.)
  severity: warning
  suggestion: Validate and sanitize header values; reject newlines
- category: security
  id: ldap-injection
  message: LDAP query with string interpolation — injection risk
  pattern: (?i)(?:ldap_search|search_s|search_ext_s)\s*\([^)]*(?:format\s*\(|\+\s*\w+|f['"])
  severity: critical
  suggestion: Use parameterized LDAP queries; escape special characters
- category: security
  id: xpath-injection
  message: XPath query with string interpolation — injection risk
  pattern: (?i)(?:xpath|selectNodes|evaluate)\s*\(\s*(?:f['"]|['"].*?\+|['"].*?format\s*\()
  severity: critical
  suggestion: Use parameterized XPath queries or sanitize input
- category: security
  id: shell-injection
  message: Shell command constructed from string interpolation — injection risk
  pattern: (?i)(?:os\.system|os\.popen|subprocess\.(?:call|run|Popen)|exec|execSync|child_process)\s*\(\s*(?:f['"]|['"].*?\+|['"].*?format\s*\(|`[^`]*\$)
  severity: critical
  suggestion: Use parameterized command execution (subprocess with list args, no shell=True)
- category: security
  id: regex-dos
  message: Regex with nested quantifiers — potential ReDoS vulnerability
  pattern: (?:\(\.\*\)\+|\(\.\+\)\*|\(\[.*?\]\+\)\+|\(\.\*\)\{|\(\w\+\)\+)
  severity: warning
  suggestion: Simplify regex to avoid catastrophic backtracking; use atomic groups or possessive quantifiers
- category: security
  id: insecure-cookie
  message: Cookie set without security flags
  pattern: (?i)(?:set_cookie|setCookie|document\.cookie)\s*(?:\(|=)(?!.*(?:secure|httponly|samesite))
  severity: warning
  suggestion: Set Secure, HttpOnly, and SameSite attributes on cookies
- category: security
  id: information-disclosure-stacktrace
  message: Stack trace or detailed errors exposed to client
  pattern: (?i)(?:traceback\.format_exc|traceback\.print_exc|e\.(?:getMessage|getStackTrace|printStackTrace)|Error\.stack)\s*(?:\(\)|;)
  severity: warning
  suggestion: Log errors server-side; return generic error messages to clients
- category: security
  id: crypto-ecb-java
  message: ECB mode in Java cipher — does not hide data patterns
  pattern: Cipher\.getInstance\s*\(\s*['"](?:AES|DES|DESede)(?:/ECB)?['"]
  severity: warning
  suggestion: Use AES/GCM/NoPadding or AES/CBC/PKCS5Padding with random IV
# ── Prompt Injection (LLM Security) ──────────────────────────────────
- category: security
  id: prompt-injection-fstring
  message: Prompt string built with f-string interpolation — prompt injection risk if variables contain user input
  pattern: (?i)(?:prompt|system_prompt|system_message|user_prompt|instructions|pre_prompt)\s*=\s*f['"]
  severity: critical
  suggestion: Build prompts with validated, sanitized inputs; never interpolate raw user data into system prompts
- category: security
  id: prompt-injection-format
  message: Prompt string built with .format() — prompt injection risk if arguments contain user input
  pattern: (?i)(?:prompt|system_prompt|system_message|user_prompt|instructions|pre_prompt)\s*=\s*['"][^'"]*['"]\.format\s*\(
  severity: critical
  suggestion: Use structured message arrays with role separation instead of string formatting
- category: security
  id: prompt-injection-concat
  message: Prompt string built with concatenation — prompt injection risk if concatenated value is user-controlled
  pattern: (?i)(?:prompt|system_prompt|system_message|user_prompt|instructions|context_prompt)\s*=\s*['"][^'"]*['"]\s*\+
  severity: critical
  suggestion: Separate system instructions from user content using the API's message/role structure
- category: security
  id: prompt-injection-percent
  message: Prompt string built with % formatting — prompt injection risk
  pattern: (?i)(?:prompt|system_prompt|system_message|user_prompt|instructions|pre_prompt)\s*=\s*['"][^'"]*%s[^'"]*['"]\s*%
  severity: critical
  suggestion: Use structured message arrays; never use % formatting to insert user data into prompts
- category: security
  id: prompt-injection-template-literal
  message: Prompt built with template literal interpolation — prompt injection risk if interpolated values are user-controlled
  pattern: (?i)(?:prompt|systemPrompt|systemMessage|userPrompt|instructions|contextPrompt)\s*=\s*`[^`]*\$\{
  severity: critical
  suggestion: Use structured message arrays with role separation; sanitize user content before inclusion
- category: security
  id: prompt-injection-content-fstring
  message: Message content field built with f-string — prompt injection regardless of variable naming
  pattern: (?i)['\"]content['\"]\s*:\s*f['"]
  severity: critical
  suggestion: Never interpolate user data into message content fields; use validated inputs only
- category: security
  id: prompt-injection-content-template
  message: Message content field built with template literal — prompt injection regardless of variable naming
  pattern: (?i)['\"]content['\"]\s*:\s*`[^`]*\$\{
  severity: critical
  suggestion: Never interpolate user data into message content fields; use validated inputs only
- category: security
  id: prompt-injection-system-role-fstring
  message: System role message with f-string content — user input in system prompt enables full prompt takeover
  pattern: (?i)['\"]role['\"]\s*:\s*['\"]system['\"][\s\S]{0,100}['\"]content['\"]\s*:\s*f['"]
  severity: critical
  suggestion: System prompts must contain only developer-controlled content; place user data in 'user' role messages only
  flags: [DOTALL]
- category: security
  id: prompt-injection-system-role-template
  message: System role message with template literal — prompt injection via system prompt
  pattern: (?i)role\s*:\s*['\"]system['\"][\s\S]{0,100}content\s*:\s*`[^`]*\$\{
  severity: critical
  suggestion: System prompts must be static strings; place user data in user role messages only
  flags: [DOTALL]
- category: security
  id: prompt-injection-url-to-prompt
  message: HTTP response content used in LLM prompt — indirect prompt injection via untrusted web content
  pattern: (?i)(?:requests\.get|httpx\.get|fetch|axios\.get|http\.Get)\s*\([^)]*\)[\s\S]{0,200}(?:prompt|messages|system_message|instruction)\s*(?:=|\+=|\.append|\.push)
  severity: warning
  suggestion: Sanitize and validate fetched content before including in prompts; instruct the model to ignore embedded instructions
  flags: [DOTALL]
- category: security
  id: prompt-injection-file-to-prompt
  message: File content loaded into LLM prompt — indirect prompt injection if file is user-uploaded or untrusted
  pattern: (?i)(?:\.read\s*\(\)|\.read_text\s*\(\)|readFile|readFileSync)\s*[\s\S]{0,200}(?:prompt|messages|system_message|instruction)\s*(?:=|\+=|\.append|\.push)
  severity: warning
  suggestion: Validate file content and strip potential injection payloads before including in prompts
  flags: [DOTALL]
- category: security
  id: prompt-injection-db-to-prompt
  message: Database query result used in LLM prompt — indirect injection if DB contains user-generated content
  pattern: (?i)(?:\.fetchone|\.fetchall|\.find\(|\.findOne|\.query\s*\()\s*[\s\S]{0,200}(?:prompt|messages|system_message|instruction)\s*(?:=|\+=|\.append|\.push)
  severity: warning
  suggestion: Treat database content as untrusted when building prompts; sanitize before inclusion
  flags: [DOTALL]
# ── LLM Safety & Configuration ──────────────────────────────────────
- category: security
  id: llm-safety-disabled-google
  message: Google AI safety settings set to BLOCK_NONE — all safety filters disabled
  pattern: (?:(?:threshold|safety|harm|block)\s*[=:]\s*.*BLOCK_NONE|HarmBlockThreshold\s*\.\s*BLOCK_NONE|['\"]BLOCK_NONE['\"])
  severity: critical
  suggestion: Use BLOCK_MEDIUM_AND_ABOVE or stricter; never disable safety filters in production
- category: security
  id: llm-safety-disabled-cohere
  message: Cohere safety_mode set to NONE — content filtering disabled
  pattern: (?i)safety_mode\s*=\s*['\"](?:NONE|none)['\"]
  severity: critical
  suggestion: Use CONTEXTUAL or STRICT safety mode in production
- category: security
  id: llm-safety-disabled-mistral
  message: Mistral safe_prompt disabled — safety guardrails removed
  pattern: (?i)safe_prompt\s*=\s*False
  severity: critical
  suggestion: Keep safe_prompt=True to enable Mistral's safety guardrails
- category: security
  id: llm-temperature-max
  message: LLM temperature set to maximum — increases unpredictability and jailbreak susceptibility
  pattern: temperature\s*[=:]\s*(?:2\.0|2(?:\.0*)?)\s*(?:[,}\)\]\s;]|$)
  severity: warning
  suggestion: Use temperature <= 1.0 for most applications; high temperature increases attack surface
  # llm-no-max-tokens removed — regex fundamentally cannot handle nested parens in real API calls.
  # This check requires AST/semantic analysis, not regex. See Takumi review fold-48.
# ── Conversation History / Multi-turn Injection ──────────────────────
- category: security
  id: llm-client-controlled-messages
  message: Client-supplied message array passed directly to LLM — attacker can inject fake system/assistant messages
  pattern: (?i)(?:request\.json|req\.body|request\.get_json)\s*(?:\[|\.get\s*\()\s*['\"]messages['\"]
  severity: critical
  suggestion: Never pass raw client message arrays to LLM; construct messages server-side with validated roles
- category: security
  id: llm-role-from-user-input
  message: Message role field from user input — allows injection of fake system/assistant messages
  pattern: (?i)['\"]role['\"]\s*:\s*(?:request\.|req\.|params\.|body\.|input\.|data\[|user_|msg\[)
  severity: critical
  suggestion: Always set message roles server-side; only allow 'user' role from client input
# ── Secrets in Prompts ───────────────────────────────────────────────
- category: security
  id: llm-secret-in-prompt
  message: API key or secret variable interpolated into LLM prompt — will be sent to LLM provider
  pattern: (?i)(?:prompt|system_prompt|system_message|instructions)\s*=\s*f['\"].*\{(?:api_key|secret|password|token|credential|db_|database_|conn)
  severity: critical
  suggestion: Never embed secrets in prompts; use tool calling to access backends securely
- category: security
  id: llm-connection-string-in-prompt
  message: Database connection string or URL in prompt template — credential exposure to LLM provider
  pattern: (?i)(?:prompt|system|instruction|message)\s*=\s*['\"].*(?:postgres(?:ql)?|mysql|mongodb|redis)://
  severity: critical
  suggestion: Never embed connection strings in prompts; use tool calling for database access
# ── Tool/Function Call Output Handling ─────────────────────────────
- category: security
  id: llm-tool-call-to-exec
  message: LLM tool call arguments passed to dangerous sink — code execution via tool calling
  pattern: (?:tool_calls|function\.arguments|tool_result|function_call)[\s\S]{0,300}(?:exec|eval|system|popen|subprocess|Runtime\.exec|ProcessBuilder|os\.Command)
  severity: critical
  suggestion: Validate and sanitize all LLM-generated tool call arguments before execution; never pass directly to shell or eval
  flags: [DOTALL]
- category: security
  id: llm-tool-call-to-sql
  message: LLM tool call arguments used in SQL query — SQL injection via tool calling
  pattern: (?:tool_calls|function\.arguments|tool_result|function_call)[\s\S]{0,300}(?:\.execute|\.query|\.raw|cursor\.)
  severity: critical
  suggestion: Parameterize SQL queries; never pass LLM-generated tool arguments directly to database queries
  flags: [DOTALL]
# ── Supply Chain (OWASP LLM03) ────────────────────────────────────
- category: security
  id: llm-untrusted-model-load
  message: Model loaded from user-controlled path — supply chain attack via malicious model
  pattern: (?i)(?:from_pretrained|load_model|AutoModel|AutoTokenizer|pipeline)\s*\(\s*(?:request|req|params|body|input|user|args|sys\.argv)
  severity: critical
  suggestion: Only load models from trusted, pinned sources; never allow user input to control model paths
- category: security
  id: llm-model-download-url
  message: Model downloaded from dynamic URL — supply chain risk
  pattern: (?i)(?:from_pretrained|load_model|download_model)\s*\(\s*f['"]|(?:from_pretrained|load_model)\s*\(\s*['"][^'"]*['"]\.format
  severity: warning
  suggestion: Pin model URLs to trusted registries; avoid dynamic model source resolution
# ── Excessive Agency (OWASP LLM06) ────────────────────────────────
- category: security
  id: llm-auto-approve-tools
  message: LLM tool execution with auto-approval — no human oversight for potentially destructive actions
  pattern: (?i)(?:auto_approve|auto_execute|skip_confirmation|confirm)\s*[=:]\s*(?:True|true|1|False|false)
  severity: warning
  suggestion: Require human confirmation for destructive tool actions; implement approval gates
- category: security
  id: llm-agent-unrestricted-tools
  message: Agent created with all tools or unrestricted tool access
  pattern: (?i)(?:tools\s*=\s*(?:get_all_tools|list_tools|ALL_TOOLS|\[.*\.\.\.\s*\])|allow_all_tools\s*=\s*True)
  severity: warning
  suggestion: Restrict agent tool access to minimum required set; apply principle of least privilege
# ── System Prompt Leakage (OWASP LLM07) ──────────────────────────
- category: security
  id: llm-system-prompt-logged
  message: System prompt written to logs — information leakage risk
  pattern: (?i)(?:log(?:ger)?|print|console)\s*\.(?:info|debug|warning|error|log)\s*\(.*(?:system_prompt|system_message|instructions)
  severity: warning
  suggestion: Never log system prompts; they may contain security-critical instructions
- category: security
  id: llm-system-prompt-returned
  message: System prompt included in API response — information leakage to client
  pattern: (?i)(?:return|jsonify|json\.dumps|res\.json|response)\s*\(.*(?:system_prompt|system_message|instructions)
  severity: warning
  suggestion: Never return system prompts to clients; keep system instructions server-side only
# ── Dangerous LLM Executors ──────────────────────────────────────────
- category: security
  id: llm-langchain-python-repl
  message: LangChain PythonREPL executes arbitrary code — critical if fed LLM output
  pattern: (?:PythonREPL|PythonREPLTool)\s*\(\s*\)
  severity: critical
  suggestion: Never use PythonREPL in production; sandbox code execution or use validated operations
- category: security
  id: llm-langchain-bash
  message: LangChain BashProcess executes shell commands — critical if fed LLM output
  pattern: (?:BashProcess|ShellTool|Terminal)\s*\(\s*\)
  severity: critical
  suggestion: Never expose shell execution to LLM agents; use specific, validated tool functions
- category: security
  id: llm-agent-unbounded-loop
  message: LLM agent in unbounded loop — runaway cost and potential infinite execution
  pattern: (?:while\s*\(\s*(?:true|True|1)\s*\)|while\s+(?:True|true|1)\s*:?)[\s\S]{0,300}(?:chat\.completions\.create|messages\.create|completion|generate|\.invoke|\.run|\.predict)
  severity: warning
  suggestion: Set iteration limits and cost guards on LLM agent loops
  flags: [DOTALL]
# ── Prompt Namespace Leakage ─────────────────────────────────────────
- category: security
  id: prompt-injection-format-locals
  message: Prompt formatted with locals()/vars() — entire namespace leaks into prompt including secrets
  pattern: (?i)(?:prompt|system|instruction|message).*\.format\s*\(\s*\*\*(?:locals|vars|globals)\s*\(\s*\)\s*\)
  severity: critical
  suggestion: Explicitly pass only intended variables to .format(); never use locals()/vars()/globals()
- category: security
  id: prompt-injection-format-map-locals
  message: Prompt built with format_map(locals()/vars()) — namespace leakage risk
  pattern: (?i)(?:prompt|system|instruction|message).*\.format_map\s*\(\s*(?:locals|vars)\s*\(\s*\)\s*\)
  severity: critical
  suggestion: Explicitly pass only intended variables; never use format_map(locals())
