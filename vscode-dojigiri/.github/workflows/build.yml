name: Build & Package

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies
        # --no-dependencies because we have no runtime deps

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: dojigiri-vsix
          path: "*.vsix"
