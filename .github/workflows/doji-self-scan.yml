name: Doji Security Scan

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  security-events: write
  contents: read

jobs:
  scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./
        id: doji
        with:
          min-severity: warning
          fail-on-critical: true

      - name: Summary
        if: always()
        run: |
          echo "### Dojigiri Scan Results" >> "$GITHUB_STEP_SUMMARY"
          echo "- Total findings: ${{ steps.doji.outputs.findings-count }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Critical: ${{ steps.doji.outputs.critical-count }}" >> "$GITHUB_STEP_SUMMARY"

  scan-pr-diff:
    name: PR Diff Scan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./
        with:
          diff-only: true
          min-severity: info
          fail-on-critical: true
