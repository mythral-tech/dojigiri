name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check dojigiri/

      - name: Format check
        run: ruff format --check dojigiri/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]" mypy

      - name: Type check
        run: mypy dojigiri/ --ignore-missing-imports
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ --ignore=tests/test_mcp_integration.py -q --tb=short --cov=dojigiri --cov-report=term-missing --cov-report=xml --cov-fail-under=65 --junitxml=junit.xml

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Test summary
        if: always() && matrix.python-version == '3.12'
        uses: test-summary/action@v2
        with:
          paths: junit.xml
        continue-on-error: true

  scan:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Self-scan (SARIF)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            python -m dojigiri scan . --output sarif --profile ci --diff origin/${{ github.base_ref }}
          else
            python -m dojigiri scan . --output sarif --profile ci
          fi

      - name: Self-scan (JSON summary)
        if: always()
        run: python -m dojigiri scan . --output json --profile ci --min-severity warning

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: dojigiri-results.sarif
        continue-on-error: true
