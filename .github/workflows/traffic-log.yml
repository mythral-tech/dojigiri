name: Log Traffic Data

on:
  schedule:
    - cron: '0 23 * * *'  # Daily at 11 PM UTC
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  log-traffic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Fetch traffic data
        env:
          GH_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
        run: |
          mkdir -p traffic

          DATE=$(date -u +%Y-%m-%d)

          VIEWS=$(gh api repos/${{ github.repository }}/traffic/views)
          CLONES=$(gh api repos/${{ github.repository }}/traffic/clones)
          PATHS=$(gh api repos/${{ github.repository }}/traffic/popular/paths)
          REFERRERS=$(gh api repos/${{ github.repository }}/traffic/popular/referrers)

          jq -n \
            --arg date "$DATE" \
            --argjson views "$VIEWS" \
            --argjson clones "$CLONES" \
            --argjson paths "$PATHS" \
            --argjson referrers "$REFERRERS" \
            '{date: $date, views: $views, clones: $clones, popular_paths: $paths, referrers: $referrers}' \
            > "traffic/${DATE}.json"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add traffic/
          git diff --cached --quiet && echo "No new data" && exit 0
          git commit -m "traffic: log $(date -u +%Y-%m-%d)"
          git push
