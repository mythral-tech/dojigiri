name: 'Dojigiri Security Scan'
description: 'Static security analysis with CWE/NIST compliance mapping — tree-sitter powered, zero config, multi-language'
author: 'Stephane Perez'
branding:
  icon: 'shield'
  color: 'red'

inputs:
  path:
    description: 'Path to scan'
    default: '.'
  min-severity:
    description: 'Minimum severity to report (info, warning, critical)'
    default: 'warning'
  output-format:
    description: 'Output format (text, json, sarif)'
    default: 'text'
  fail-on-findings:
    description: 'Fail the action if any findings at or above min-severity'
    default: 'true'
  deep:
    description: 'Run deep scan with LLM analysis (requires ANTHROPIC_API_KEY)'
    default: 'false'
  diff-only:
    description: 'Only scan changed files (PR mode)'
    default: 'false'
  profile:
    description: 'Compliance profile preset (owasp, dod, ci)'
    default: ''
  ignore-rules:
    description: 'Comma-separated rule names to suppress'
    default: ''
  python-version:
    description: 'Python version to use'
    default: '3.12'

outputs:
  findings-count:
    description: 'Total number of findings'
    value: ${{ steps.scan.outputs.findings-count }}
  critical-count:
    description: 'Number of critical findings'
    value: ${{ steps.scan.outputs.critical-count }}
  sarif-path:
    description: 'Path to SARIF output file (only set when output-format is sarif)'
    value: ${{ steps.scan.outputs.sarif-path }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install Dojigiri
      shell: bash
      run: pip install --quiet "${{ github.action_path }}"

    - name: Run scan
      id: scan
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        INPUT_MIN_SEVERITY: ${{ inputs.min-severity }}
        INPUT_OUTPUT_FORMAT: ${{ inputs.output-format }}
        INPUT_FAIL_ON_FINDINGS: ${{ inputs.fail-on-findings }}
        INPUT_DEEP: ${{ inputs.deep }}
        INPUT_DIFF_ONLY: ${{ inputs.diff-only }}
        INPUT_PROFILE: ${{ inputs.profile }}
        INPUT_IGNORE_RULES: ${{ inputs.ignore-rules }}
      run: |
        set +e

        # Build scan command
        ARGS=("$INPUT_PATH" --min-severity "$INPUT_MIN_SEVERITY" --output json)

        if [ "$INPUT_DEEP" = "true" ]; then
          ARGS+=(--deep --accept-remote)
        fi

        if [ "$INPUT_DIFF_ONLY" = "true" ]; then
          ARGS+=(--diff)
        fi

        if [ -n "$INPUT_PROFILE" ]; then
          ARGS+=(--profile "$INPUT_PROFILE")
        fi

        if [ -n "$INPUT_IGNORE_RULES" ]; then
          ARGS+=(--ignore "$INPUT_IGNORE_RULES")
        fi

        # Always run JSON to get structured counts
        JSON_OUTPUT=$(python -m dojigiri scan "${ARGS[@]}" 2>/tmp/doji-stderr.txt)
        SCAN_EXIT=$?

        FINDINGS=$(echo "$JSON_OUTPUT" | python -c "import sys,json; d=json.load(sys.stdin); print(d.get('total_findings',0))" 2>/dev/null || echo "0")
        CRITICAL=$(echo "$JSON_OUTPUT" | python -c "import sys,json; d=json.load(sys.stdin); print(d.get('critical',0))" 2>/dev/null || echo "0")

        echo "findings-count=$FINDINGS" >> "$GITHUB_OUTPUT"
        echo "critical-count=$CRITICAL" >> "$GITHUB_OUTPUT"

        # Produce requested output format
        if [ "$INPUT_OUTPUT_FORMAT" = "sarif" ]; then
          SARIF_ARGS=("$INPUT_PATH" --min-severity "$INPUT_MIN_SEVERITY" --output sarif)
          if [ "$INPUT_DEEP" = "true" ]; then SARIF_ARGS+=(--deep --accept-remote); fi
          if [ "$INPUT_DIFF_ONLY" = "true" ]; then SARIF_ARGS+=(--diff); fi
          if [ -n "$INPUT_PROFILE" ]; then SARIF_ARGS+=(--profile "$INPUT_PROFILE"); fi
          if [ -n "$INPUT_IGNORE_RULES" ]; then SARIF_ARGS+=(--ignore "$INPUT_IGNORE_RULES"); fi

          python -m dojigiri scan "${SARIF_ARGS[@]}" > dojigiri-results.sarif 2>/dev/null
          echo "sarif-path=dojigiri-results.sarif" >> "$GITHUB_OUTPUT"

          # Also print text summary to the log
          python -m dojigiri scan "$INPUT_PATH" --min-severity "$INPUT_MIN_SEVERITY" --output text 2>/dev/null || true
        elif [ "$INPUT_OUTPUT_FORMAT" = "json" ]; then
          echo "$JSON_OUTPUT"
        else
          # Text output for the log
          python -m dojigiri scan "$INPUT_PATH" --min-severity "$INPUT_MIN_SEVERITY" --output text 2>/dev/null || true
        fi

        # Stderr warnings
        if [ -s /tmp/doji-stderr.txt ]; then
          cat /tmp/doji-stderr.txt >&2
        fi

        # Fail logic
        if [ "$INPUT_FAIL_ON_FINDINGS" = "true" ] && [ "$FINDINGS" -gt 0 ] 2>/dev/null; then
          echo "::error::Dojigiri found $FINDINGS finding(s) ($CRITICAL critical)"
          exit 1
        fi

        # Also fail if scan itself errored (exit 1 = bad args, not findings)
        if [ "$SCAN_EXIT" = "1" ]; then
          echo "::error::Dojigiri scan failed. Check stderr above."
          exit 1
        fi

        exit 0

    - name: Upload SARIF
      if: inputs.output-format == 'sarif' && always()
      uses: github/codeql-action/upload-sarif@v3
      continue-on-error: true
      with:
        sarif_file: dojigiri-results.sarif
        category: dojigiri
